body:
  text: 卷七病不可發汗證第一少陰病脈細沉數病為在裡不可發其汗脈浮而緊法當身體疼痛當以汗解假令尺中脈遲者不可發其汗何以知然此為榮氣不足血微少故也少陰病脈微一作濡而微弱不可發其汗無陽故也脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微發汗躁不得眠動氣在右不可發汗發汗則衄而渴心苦煩飲即吐水動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤動氣在上不可發汗發汗則氣上衝正在心端動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目運惡寒食即反吐谷不得前一雲谷不消化咽中閉塞不可發汗發汗則吐血氣微絶手足逆冷欲得蜷臥不能自溫諸脈數動微弱並不可發汗發汗則大便難腹中乾一云小便難胞中干胃燥而煩其形相象根本異源脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛不可發汗發汗則寒栗不能自還咳者則劇數吐涎沫咽中必干小便不利心中飢煩晬時而發其形似瘧有寒無熱虛而寒栗咳而發汗蜷而苦滿滿一作心痛腹中復堅厥不可發汗發汗則聲亂咽嘶舌萎谷不得前諸逆發汗微者難愈劇者言亂睛眩者死命將難全太陽病得之八九日如瘧狀發熱而惡寒熱多寒少其人不嘔清便續自可一日再三發其脈微而惡寒此為陰陽俱虛不可復發汗也太陽病發熱惡寒熱多寒少脈微弱則無陽也不可復發其汗咽乾燥者不可發汗亡血家不可攻其表汗出則寒栗而振衄家不可攻其表汗出必額陷脈上促急而緊直視而不能眴不得眠汗家重發其汗必恍惚心亂小便已陰疼可與禹餘糧丸淋家不可發汗發其汗必便血瘡家雖身疼痛不可攻其表汗出則痓一作痙下同冬時發其汗必吐利口中爛生瘡下利清穀不可攻其表汗出必脹滿咳而小便利若失小便不可攻其表汗出則厥逆冷汗出多極發其汗亦堅傷寒一二日至四五日厥者必發熱前厥者後必熱厥深者熱亦深厥微者熱亦微厥應下之而反發其汗必口傷爛赤病人脈數數為有熱當消穀引食反吐者醫發其汗陽微膈氣虛脈則為數數為客陽不能消穀胃中虛冷故令吐也傷寒四五日其脈沉煩而喘滿脈沉者病為在裡反發其汗津液越出大便為難表虛里實久則譫語傷寒頭痛翕翕發熱形象中風常微汗出又自嘔者下之益煩心懊憹如飢發汗則致痓身強難以屈伸熏之則發黃不得小便久則發咳唾太陽病發其汗因致痓傷寒脈弦細頭痛而反發熱此屬少陽少陽不可發其汗太陽與少陽並病頭項強痛或眩冒時如結胸心下痞堅者不可發其汗少陰病咳而下利譫語者此被火氣劫故也小便必難以強責少陰汗也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出一本作耳目者是為下厥上竭為難治傷寒有五皆熱病之類也同病異名同脈異經病雖俱傷於風其人自有痼疾則不得同法其人素傷於風因復傷於熱風熱相薄則發風溫四肢不收頭痛身熱常汗出不解治在少陰厥陰不可發汗汗出譫言獨語內煩躁擾不得臥善驚目亂無精治之復發其汗如此者醫殺之也傷寒濕溫其人常傷於濕因而中暍濕熱相薄則發濕溫病苦兩脛逆冷腹滿叉胸頭目痛苦妄言治在足太陰不可發汗汗出必不能言耳聾不知痛所在身青面色變名曰重暍如此者死醫殺之也上二首出醫律病可發汗證第二大法春夏宜發汗凡發汗欲令手足皆周至漐漐一時間益佳但不欲如水流離若病不解當重發汗汗多則亡陽陽虛不得重發汗也凡服湯藥發汗中病便止不必盡劑也凡云可發汗而無湯者丸散亦可用要以汗出為解然不如湯隨證良太陽病外證未解其脈浮弱當以汗解宜桂枝湯太陽病脈浮而數者可發其汗屬桂枝湯證陽明病脈遲汗出多微惡寒表為未解可發其汗屬桂枝湯證夫病脈浮大問病者言但堅耳設利者為虛大逆堅為實汗出而解何以故脈浮當以汗解傷寒其脈不弦緊而弱弱者必渴被火必譫語弱者發熱脈浮解之當汗出愈病者煩熱汗出即解復如瘧狀日晡所發熱此屬陽明脈浮虛者當發其汗屬桂枝湯證病常自汗出此為榮氣和榮氣和而外不解此衛不和也榮行脈中為陰主內衛行脈外為陽主外復發其汗衛和則愈屬桂枝湯證病人臟無他病時發熱自汗出而不愈此衛氣不和也先其時發汗即愈屬桂枝湯證脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼可發其汗宜麻黃湯太陽病不解熱結膀胱其人如狂血必自下下者即愈其外未解者尚未可攻當先解其外屬桂枝湯證太陽病下之微喘者表未解故也屬桂枝加厚朴杏子湯證傷寒脈浮緊不發其汗因衄屬麻黃湯證陽明病脈浮無汗其人必喘發其汗則愈屬麻黃湯證太陰病脈浮者可發其汗屬桂枝湯證太陽病脈浮緊無汗而發熱其身疼痛八九日不解表候續在此當發其汗服湯微除發煩目瞑劇者必衄衄乃解所以然者陽氣重故也屬麻黃湯證脈浮者病在表可發其汗屬桂枝湯證傷寒不大便六七日頭痛有熱與承氣湯其大便反青一作小便清者此為不在裡故在表也當發其汗頭痛者必衄屬桂枝湯證下利後身體疼痛清便自調急當救表宜桂枝湯太陽病頭痛發熱汗出惡風若惡寒屬桂枝湯證太陽中風陽浮而陰濡弱浮者熱自發濡弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔屬桂枝湯證太陽病發熱汗出此為榮弱衛強故使汗出欲救邪風屬桂枝湯證太陽病下之氣上撞可與桂枝湯不撞不可與之太陽病初服桂枝湯而反煩不解者法當先刺風池風府卻與桂枝湯則愈燒針令其汗針處被寒核起而赤者必發賁豚氣從少腹上撞心者灸其核上一壯與桂枝加桂湯太陽病項背強𠘧𠘧反汗出惡風屬桂枝加葛根湯太陽病項背強𠘧𠘧無汗惡風屬葛根湯太陽與陽明合病而自利不嘔者屬葛根湯證太陽與陽明合病不下利但嘔屬葛根加半夏湯太陽病桂枝證醫反下之遂利不止其脈促者表未解喘而汗出屬葛根黃芩黃連湯太陽病頭痛發熱身體疼腰痛骨節疼痛惡風無汗而喘屬麻黃湯證太陽與陽明合病喘而胸滿不可下也屬麻黃湯證太陽中風脈浮緊發熱惡寒身體疼痛不汗出而煩躁頭痛屬大青龍湯脈微弱汗出惡風不可服之服之則厥筋惕肉瞤此為逆也傷寒脈浮緩其身不疼但重乍有輕時無少陰證者大青龍湯發之傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利小腹滿或微喘屬小青龍湯傷寒心下有水氣咳而微喘發熱不渴服湯已而渴者此寒去為欲解屬小青龍湯證陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通一作按之不痛鼻乾不得汗嗜臥一身及目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮與小柴胡湯但浮無餘證與麻黃湯不溺腹滿加噦不治太陽病十日以去脈浮細嗜臥此為外解設胸滿脅痛與小柴胡湯脈浮者屬麻黃湯證中風往來寒熱傷寒五六日以後胸脅苦滿默默不欲飲食煩心喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞堅或心中悸小便不利或不渴外有微熱或咳者屬小柴胡湯傷寒四五日身體熱惡風頸項強脅下滿手足溫而渴屬小柴胡湯證傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者屬柴胡桂枝湯少陰病得之二三日麻黃附子甘草湯微發汗以二三日無證故微發汗也脈浮小便不利微熱消渴與五苓散利小便發汗病發汗以後證第三二陽並病太陽初得病時發其汗汗先出復不徹因轉屬陽明續自微汗出不惡寒若太陽證不罷不可下下之為逆如此者可小發其汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不大徹不足言陽氣怫鬱不得越當汗而不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐汗出而不徹故也更發其汗即愈何以知其汗不徹脈澀故以知之未持脈時病人叉手自冒心師因教試令咳而不即咳者此必兩耳無所聞也所以然者重發其汗虛故也發汗後飲水多者必喘以水灌之亦喘發汗後水藥不得入口為逆若更發其汗必吐下不止陽明病本自汗出醫復重發其汗病已瘥其人微煩不了了此大便堅也以亡津液胃中乾燥故令其堅當問小便日幾行若本日三四行今日再行者必知大便不久出今為小便數少津液當還入胃中故知必當大便也發汗多又復發其汗此為亡陽皆譫語脈短者死脈自和者不死傷寒發其汗身目為黃所以然者寒濕相摶在裡不解故也病人有寒復發其汗胃中冷必吐蛔太陽病發其汗遂漏而不止其人惡風小便難四肢微急難以屈伸屬桂枝加附子湯服桂枝湯大汗出若脈但洪大與桂枝湯若其形如瘧一日再三發汗出便解屬桂枝二麻黃一湯服桂枝湯大汗出大煩渴不解若脈洪大屬白虎湯傷寒脈浮自汗出小便數頗覆仲景頗覆字作心煩微惡寒而腳攣急反與桂枝欲攻其表得之便厥咽乾煩躁吐逆當作甘草乾薑湯以復其陽厥愈足溫更作芍藥甘草湯與之其腳即伸而胃氣不和譫語可與承氣湯重發其汗復加燒針者屬四逆湯傷寒發汗已解半日許復煩其脈浮數可復發其汗屬桂枝湯發汗後身體疼痛其脈沉遲屬桂枝加芍藥生薑人參湯發汗後不可更行桂枝湯汗出而喘無大熱可以麻黃杏子甘草石膏湯發汗過多以後其人叉手自冒心心下悸而欲得按之屬桂枝甘草湯發汗後其人臍下悸欲作賁豚屬茯苓桂枝甘草大棗湯發汗後腹脹滿屬厚朴生薑半夏甘草人參湯發其汗不解而反惡寒者虛故也屬芍藥甘草附子湯不惡寒但熱者實也當和其胃氣宜小承氣湯太陽病發汗若大汗出胃中燥煩不得眠其人欲飲水當稍飲之令胃中和則愈發汗已脈浮而數復煩渴者屬五苓散傷寒汗出而渴屬五苓散證不渴屬茯苓甘草湯太陽病發其汗汗出不解其人發熱心下悸頭眩身瞤而動振振欲劈地屬真武湯傷寒汗出解之後胃中不和心下痞堅乾噫食臭脅下有水氣腹中雷鳴而利屬生薑瀉心湯傷寒發熱汗出不解後心中痞堅嘔而下利屬大柴胡湯太陽病三日發其汗不解蒸蒸發熱者屬於胃也屬承氣湯大汗出熱不去內拘急四肢疼下利厥逆而惡寒屬四逆湯發汗多亡陽譫語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈病不可吐證第四太陽病當惡寒而發熱今自汗出反不惡寒發熱關上脈細而數此醫吐之過也若得病一日二日吐之腹中飢口不能食三日四日吐之不喜糜粥欲食冷食朝食暮吐此醫吐之所致也此為小逆太陽病吐之者但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也少陰病飲食入則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲此胸中實不可下若膈上有寒飲乾嘔者不可吐當溫之諸四逆厥者不可吐之虛家亦然病可吐證第五大法春宜吐凡服湯吐中病便止不必盡劑也病如桂枝證其頭不痛項不強寸口脈微浮胸中痞堅氣上撞咽喉不得息此為胸有寒當吐之病胸上諸實胸中鬱郁而痛不能食欲使人按之而反有濁唾下利日十餘行其脈反遲寸口微滑此可吐之吐之利即止少陰病飲食入則吐心中溫溫欲吐復不能吐當遂吐之宿食在上脘當吐之病者手足厥冷脈乍緊邪結在胸中心下滿而煩飢不能食病在胸中當吐之病不可下證第六脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微不可下下之則心下痞堅動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸動氣在左不可下下之則腹裡拘急食不下動氣反劇身雖有熱臥反欲蜷動氣在上不可下下之則掌握熱煩身浮冷熱汗自泄欲水自灌動氣在下不可下下之則腹滿卒起頭眩食則下清穀心下痞堅咽中閉塞不可下下之則上輕下重水漿不下臥則欲蜷身體急痛復下利日十數行諸外實不可下下之則發微熱亡脈則厥當臍握熱諸虛不可下下之則渴引水者易愈惡水者劇脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛虛者不可下微則為咳咳則吐涎沫下之咳則止而利不休胸中如蟲齧粥入則出小便不利兩脅拘急喘息為難頸背相牽臂則不仁極寒反汗出軀冷若冰眼睛不慧語言不休穀氣多入則為除中口雖欲言舌不得前脈濡而弱弱反在關濡反在巔浮反在上數反在下浮則為陽虛數則為無血浮則為虛數則生熱浮則為虛自汗而惡寒數則為痛振而寒栗微弱在關胸下為急喘汗不得呼吸呼吸之中痛在於脅振寒相搏其形如瘧醫反下之令脈急數發熱狂走見鬼心下為痞小便淋瀝少腹甚堅小便血也脈濡而緊濡則陽氣微緊則榮中寒陽微衛中風發熱而惡寒榮緊胃氣冷微嘔心內煩醫以為大熱解肌而發汗亡陽虛煩躁心下苦痞堅表裡俱虛竭卒起而頭眩客熱在皮膚悵快不得眠不知胃氣冷緊寒在關元技巧無所施汲水灌其身客熱應時罷栗栗而振寒重被而覆之汗出而冒巔體惕而又振小便為微難寒氣因水發清穀不容間嘔變反腸出顛倒不得安手足為微逆身冷而內煩遲欲從後救安可復追還脈浮而大浮為氣實大為血虛血虛為無陰孤陽獨下陰部小便難胞中虛今反小便利而大汗出法衛家當微今反更實津液四射榮竭血盡干煩不眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虛客陽去有期必下如汙泥而死趺陽脈遲而緩胃氣如經趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也榮衛內陷其數先微脈反但浮其人必堅氣噫而除何以言之脾脈本緩今數脈動脾其數先微故知脾氣不治大便堅氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當遲緩脈因前後度數如前仲景前字作法病者則飢數脈不時則生惡瘡脈數者久數不止止則邪結正氣不能復正氣卻結於臟故邪氣浮之與皮毛相得脈數者不可下下之必煩利不止少陰病脈微不可發其汗無陽故也陽已虛尺中弱澀者復不可下之脈浮大應發其汗醫反下之此為大逆脈浮而大心下反堅有熱屬臟攻之不全微汗屬腑溲數則堅汗多即愈汗少便難脈遲尚未可攻二陽並病太陽初得病時發其汗汗先出復不徹因轉屬陽明欲自汗出不惡寒若太陽證不罷不可下下之為逆結胸證其脈浮大不可下下之即死太陽與陽明合病喘而胸滿不可下之太陽與少陽並病心下痞堅頸項強而眩勿下之諸四逆厥者不可下之虛家亦然病欲吐者不可下之太陽病有外證未解不可下下之為逆病發於陽而反下之熱入因作結胸發於陰而反下之因作痞痞脈浮堅而下之緊反入里因作痞夫病陽多者熱下之則堅本虛攻其熱必噦無陽陰強而堅下之必清穀而腹滿太陰之為病腹滿而吐食不下下之益甚腹時自痛胸下結堅厥陰之為病消渴氣上撞心中疼熱飢而不欲食甚者則欲吐下之不肯止少陰病其人飲食入則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲此胸中實不可下也傷寒五六日不結胸腹濡脈虛復厥者不可下下之亡血死傷寒發熱但頭痛微汗出發其汗則不識人熏之則喘不得小便心腹滿下之則短氣而腹滿小便難頭痛背強加溫針則必衄傷寒其脈陰陽俱緊惡寒發熱則脈欲厥厥者脈初來大漸漸小更來漸大是其候也惡寒甚者翕翕汗出喉中痛熱多者目赤睛不慧醫復發之咽中則傷若復下之則兩目閉寒多清穀熱多便膿血熏之則發黃尉之則咽燥小便利者可救難者必危殆傷寒發熱口中勃勃氣出頭痛目黃鼻衄不可制貪水者必嘔惡水者厥下之咽中生瘡假令手足溫者下重便膿血頭痛目黃者下之目閉貪水者下之其脈必厥其聲嚶咽喉塞發其汗則戰栗陰陽俱虛惡水者下之里冷不嗜食大便完穀出發其汗口中傷舌上苔滑煩躁脈數實不大便六七日後必便血復發其汗小便即自利得病二三日脈弱無太陽柴胡證而煩躁心下堅至四日雖能食以承氣湯少與微和之令小安至六日與承氣湯一升不大便六七日小便少者雖不大便但頭堅後溏未定成其堅攻之必溏當須小便利定堅乃可攻之臟結無陽證寒而不熱傷寒論云不往來寒熱其人反靜舌上苔滑者不可攻也傷寒嘔多雖有陽明證不可攻之陽明病潮熱微堅可與承氣湯不堅不可與若不大便六七日恐有燥屎欲知之法可少與小承氣湯腹中轉失氣者此為有燥屎乃可攻之若不轉失氣者此但頭堅後溏不可攻之攻之必腹滿不能食欲飲水者即噦其後發熱者必復堅以小承氣湯和之若不轉失氣者慎不可攻之陽明病身合色赤者不可攻也必發熱色黃者小便不利也陽明病當心下堅滿不可攻之攻之遂利不止者死止者愈陽明病自汗出若發其汗小便自利此為內竭雖堅不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及豬膽汁皆可以導下利其脈浮大此為虛以強下之故也設脈浮革因爾腸鳴屬當歸四逆湯病可下證第七大法秋宜下凡可下者以湯勝丸散中病便止不必盡三服陽明病發熱汗多者急下之屬大柴胡湯少陰病得之二三日口燥咽乾者急下之屬承氣湯少陰病六七日腹滿不大便者急下之屬承氣湯證少陰病下利清水色青者心下必痛口乾燥者可下之屬大柴胡湯承氣湯證下利三部脈皆平按其心下堅者可下之屬承氣湯證陽明與少陽合病而利脈不負者為順負者失也互相剋賊為負滑而數者有宿食當下之屬大柴胡承氣湯證傷寒後脈沉沉為內實玉函云脈沉實沉實者下之下之解屬大柴胡湯證傷寒六七日目中不了了睛不和無表裡證大便難微熱者此為實急下之屬大柴胡湯承氣湯證太陽病未解其脈陰陽俱停必先振汗出解但陽微者先汗之而解但陰微者先下之而解屬大柴胡湯證陰微一作尺實脈雙弦遲心下堅脈大而緊者陽中有陰可下之屬承氣湯證結胸者項亦強如柔痓狀下之即和病者無表裡證發熱七八日雖脈浮數可下之屬大柴胡湯證太陽病六七日表證續在其脈微沉反不結胸其人發狂此熱在下焦少腹當堅而滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也屬抵當湯太陽病身黃其脈沉結少腹堅小便不利為無血小便自利其人如狂者血證諦屬抵當湯證傷寒有熱而少腹滿應小便不利今反利者此為血當下之屬抵當丸證陽明病發熱而汗出此為熱越不能發黃但頭汗出其身無有齊頸而還小便不利渴引水漿此為瘀熱在裡身必發黃屬茵陳蒿湯陽明證其人喜忘必有畜血所以然者本有久瘀血故令喜忘雖堅大便必黑屬抵當湯證汗出而譫語者有燥屎在胃中此風也過經乃可下之下之若早語言亂以表虛里實故也下之則愈屬大柴胡湯承氣湯證病者煩熱汗出即解復如瘧狀日晡所發者屬陽明脈實者當下之屬大柴胡湯承氣湯證陽明病譫語有潮熱而反不能食者必有燥屎五六枚若能食者但堅耳屬承氣湯證太陽中風下利嘔逆表解乃可攻之其人漐漐汗出發作有時頭痛心下痞堅滿引脅下痛嘔則短氣汗出不惡寒此為表解里未和屬十棗湯太陽病不解熱結膀胱其人如狂血自下下之即愈其外未解尚未可攻當先解外外解小腹急結者乃可攻之屬桃仁承氣湯傷寒七八日身黃如橘小便不利少腹微滿屬茵陳蒿湯證傷寒十餘日熱結在裡復往來寒熱屬大柴胡湯證但結胸無大熱此為水結在胸脅頭微汗出與大陷胸湯傷寒六七日結胸熱實其脈沉緊心下痛按之如石堅與大陷胸湯陽明病其人汗多津液外出胃中燥大便必堅堅者則譫語屬承氣湯證陽明病不吐下而心煩者可與承氣湯陽明病其脈遲雖汗出而不惡寒其體一本作人必重短氣腹滿而喘有潮熱如此者其外為解可攻其里若手足濈然汗出者此大便已堅屬承氣湯其熱不潮未可與承氣湯若腹滿大而不大便者屬小承氣湯微和胃氣勿令至大下陽明病譫語發潮熱其脈滑疾如此者屬承氣湯因與承氣湯一升腹中轉失氣者復與一升如不轉失氣者勿更與之明日又不大便脈反微澀者此為裡虛為難治不可更與承氣湯二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之愈屬承氣湯證病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也屬承氣湯證病發汗吐下以後證第八師曰病人脈微而澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒而發熱無休止時夏月盛熱而與仲景作欲著復衣冬月盛寒而與仲景作欲裸其體所以然者陽微即惡寒陰弱即發熱故仲景作醫發其汗使陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故與仲景作欲著復衣十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故與仲景作欲裸其體又陰脈遲澀故知亡血太陽病三日已發其汗吐下溫針而不解此為壞病桂枝復不中與也觀其脈證知犯何逆隨證而治之脈浮數法當汗出而愈而下之則身體重心悸不可發其汗當自汗出而解所以然者尺中脈微此裡虛須表裡實津液和即自汗出愈凡病若發汗若吐若下若亡血無津液而陰陽自和者必自愈大下後發汗其人小便不利此亡津液勿治其小便利必自愈下以後復發其汗必振寒又其脈微細所以然者內外俱虛故也太陽病先下而不愈因復發其汗表裡俱虛其人因冒冒家當汗出自愈所以然者汗出表和故也表和然後下之得病六七日脈遲浮弱惡風寒手足溫醫再三下之不能多多一作食其人脅下滿面目及身黃頸項強小便難與柴胡湯後必下重本渴飲水而嘔柴胡湯復不中與也食谷者噦太陽病二三日終不能臥但欲起者心下必結其脈微弱者此本寒也而反下之利止者必結胸未止者四五日復重下之此挾熱利也太陽病下之其脈促不結胸者此為欲解其脈浮者必結胸其脈緊者必咽痛其脈弦者必兩脅拘急其脈細而數者頭痛未止其脈沉而緊者必欲嘔其脈沉而滑者挾熱利其脈浮而滑者必下血太陽少陽並病而反下之成結胸心下堅下利不復止水漿不肯下其人必心煩脈浮緊而下之緊反入里則作痞按之自濡但氣痞耳傷寒吐下發汗虛煩脈甚微八九日心下痞堅脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿陽明病不能食下之不解其人不能食攻其熱必噦所以然者胃中虛冷故也陽明病脈遲食難用飽飽即發煩頭眩者必小便難此欲作谷疸雖下之其腹滿如故耳所以然者脈遲故也太陽病寸緩關浮尺弱其人發熱而汗出復惡寒不嘔但心下痞者此為醫下之也傷寒大吐大下之極虛復極汗者其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也吐下發汗後其人脈平而小煩者以新虛不勝穀氣故也太陽病醫發其汗遂發熱而惡寒復下之則心下痞此表裡俱虛陰陽氣並竭無陽則陰獨復加火針因而煩面色青黃膚瞤如此者為難治今色微黃手足溫者易愈服桂枝湯下之頭項強痛翕翕發熱無汗心下滿微痛小便不利屬桂枝去桂加茯苓朮湯太陽病先發其汗不解而下之其脈浮者不愈浮為在外而反下之故令不愈今脈浮故在外當解其外則愈屬桂枝湯下以後復發其汗者則晝日煩躁不眠夜而安靜不嘔不渴而無表證其脈沉微身無大熱屬乾薑附子湯傷寒吐下發汗後心下逆滿氣上撞胸起即頭眩其脈沉緊發汗即動經身為振搖屬茯苓桂枝術甘草湯發汗吐下以後不解煩躁屬茯苓四逆湯傷寒發汗吐下後虛煩不得眠劇者反覆顛倒心中懊憹屬梔子湯若少氣梔子甘草湯若嘔梔子生薑湯若腹滿者梔子厚朴湯發汗若下之煩熱胸中塞者屬梔子湯證太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏其腹微滿鬱郁微煩先時自極吐下者與承氣湯不爾者不可與欲嘔胸中痛微溏此非柴胡湯證以嘔故知極吐下也太陽病重發其汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹堅滿而痛不可近屬大陷胸湯傷寒五六日其人已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩此為未解屬柴胡桂枝幹薑湯傷寒汗出若吐下解後心下痞堅噫氣不除者屬旋覆代赭湯大下以後不可更行桂枝湯汗出而喘無大熱可以麻黃杏子甘草石膏湯傷寒大下後復發其汗心下痞惡寒者表未解也不可攻其痞當先解表表解乃攻其痞解表屬桂枝湯攻痞屬大黃黃連瀉心湯傷寒吐下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升屬白虎湯傷寒吐下後未解不大便五六日至十餘日其人日晡所發潮熱不惡寒獨語如見鬼神之狀若劇者發則不識人循衣妄撮怵惕不安微喘直視脈弦者生澀者死微者但發熱譫語屬承氣湯若下者勿復服三陽合病腹滿身重難以轉側口不仁面垢譫語遺溺發汗則譫語下之則額上生汗手足厥冷自汗屬白虎湯證陽明病其脈浮緊咽乾口苦腹滿而喘發熱汗出而不惡寒反偏惡熱其身體重發其汗即躁心憒憒而反譫語加溫針必怵惕又煩躁不得眠下之即胃中空虛客氣動膈心中懊憹舌上苔者屬梔子湯證陽明病下之其外有熱手足溫不結胸心中懊憹若飢不能食但頭汗出屬梔子湯證陽明病下之心中懊憹而煩胃中有燥屎者可攻其人腹微滿頭堅後溏者不可下之有燥屎者屬承氣湯證太陽病吐下發汗後微煩小便數大便因堅可與小承氣湯和之則愈大汗若大下而厥冷者屬四逆湯證太陽病下之其脈促胸滿者屬桂枝去芍藥湯若微寒屬桂枝去芍藥加附子湯傷寒五六日大下之身熱不去心中結痛者未欲解也屬梔子湯證傷寒下後煩而腹滿臥起不安屬梔子厚朴湯傷寒醫以丸藥大下之身熱不去微煩屬梔子乾薑湯傷寒醫下之續得下利清穀不止身體疼痛急當救里身體疼痛清便自調急當救表救里宜四逆湯救表宜桂枝湯太陽病過經十餘日反再三下之後四五日柴胡證續在先與小柴胡湯嘔止小安嘔止小安一云嘔不止心下急其人鬱郁微煩者為未解與大柴胡湯下者止傷寒十三日不解胸脅滿而嘔日晡所發潮熱而微利此本當柴胡湯下之不得利今反利者故知醫以丸藥下之非其治也潮熱者實也先再服小柴胡湯以解其外後屬柴胡加芒硝湯傷寒十三日過經而譫語內有熱也當以湯下之小便利者大便當堅而反利其脈調和者知醫以丸藥下之非其治也自利者其脈當微厥今反和者此為內實屬承氣湯證傷寒八九日下之胸滿煩驚小便不利譫語一身不可轉側屬柴胡加龍骨牡蠣湯火逆下之因燒針煩躁屬桂枝甘草龍骨牡蠣湯太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒其表未解醫反下之動數則遲頭痛即眩一云膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因堅則為結胸屬大陷胸湯若不結胸但頭汗出其餘無有齊頸而還小便不利身必發黃傷寒五六日嘔而發熱柴胡湯證具而以他藥下之柴胡證仍在復與柴胡湯此雖已下不為逆也必蒸蒸而振卻發熱汗出而解若心下滿而堅痛者此為結胸屬大陷胸湯若但滿而不痛者此為痞柴胡復不中與也屬半夏瀉心湯本以下之故心下痞與之瀉心其痞不解其人渴而口燥小便不利者屬五苓散一方言忍之一日乃愈傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞堅而滿乾嘔而煩不能得安醫見心下痞為病不盡復重下之其痞益甚此非結熱但胃中虛客氣上逆故使之堅屬甘草瀉心湯傷寒服湯藥而下利不止心下痞堅服瀉心湯已後以他藥下之利不止醫以理中與之利益甚理中理中焦此利在下焦屬赤石脂禹餘糧湯若不止者當利其小便太陽病外證未除而數下之遂挾熱而利不止心下痞堅表裡不解屬桂枝人參湯傷寒吐後腹滿者與承氣湯病者無表裡證發熱七八日脈雖浮數者可下之假令下已脈數不解今熱則消穀喜飢至六七日不大便者有瘀血屬抵當湯若脈數不解而不止必夾血便膿血太陽病醫反下之因腹滿時痛為屬太陰屬桂枝加芍藥湯大實痛屬桂枝加大黃湯傷寒六七日其人大下後脈沉遲手足厥逆下部脈不至喉咽不利唾膿血泄利不止為難治屬麻黃升麻湯傷寒本自寒下醫復吐下之寒格更遂吐一本作更逆吐下食入即出屬乾薑黃芩黃連人參湯病可溫證第九大法冬宜服溫熱藥及灸師曰病發熱頭痛脈反沉若不瘥身體更疼痛當救其里宜溫藥四逆湯下利腹滿身體疼痛先溫其里宜四逆湯自利不渴者屬太陰其臟有寒故也當溫之宜四逆輩少陰病其人飲食入則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲若膈上有寒飲乾嘔者不可吐當溫之宜四逆湯少陰病脈沉者急當溫之宜四逆湯下利欲食者就當溫之下利脈遲緊為痛未欲止當溫之得冷者滿而便腸垢下利其脈浮大此為虛以強下之故也設脈浮革因爾腸鳴當溫之宜當歸四逆湯少陰病下利脈微澀者即嘔汗出必數更衣反少當溫之傷寒醫下之續得下利清穀不止身體疼痛急當救里宜溫之以四逆湯病不可灸證第十微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也脈浮當以汗解而反灸之邪無從去因火而盛病從腰以下必當重而痹此為火逆若欲自解當先煩煩乃有汗隨汗而解何以知之脈浮故知汗出當解脈浮熱甚而灸之此為實實以虛治因火而動咽燥必唾血病可灸證第十一燒針令其汗針處被寒核起而赤者必發賁豚氣從少腹上撞者灸其核上一壯一本作各一壯與桂枝加桂湯少陰病得之一二日口中和其背惡寒者當灸之少陰病其人吐利手足不逆反發熱不死脈不至者灸其少陰七壯少陰病下利脈微澀者即嘔汗出必數更衣反少當溫其上灸之一云灸厥陰可五十壯諸下利皆可灸足大都五壯一云七壯商丘陰陵泉皆三壯下利手足厥無脈灸之不溫反微喘者死少陰負趺陽者為順也傷寒六七日其脈微手足厥煩躁灸其厥陰厥不還者死傷寒脈促手足厥逆可灸之為可灸少陰厥陰主逆病不可刺證第十二大怒無刺大一作新已刺無怒已一作新新內無刺已刺無內大勞無刺大一作新已刺無勞大醉無刺已刺無醉大飽無刺已刺無飽大飢無刺已刺無飢大渴無刺已刺無渴無刺大驚無刺熇熇之熱無刺漉漉之汗無刺渾渾之脈身熱甚陰陽皆爭者勿刺也其可刺者急取之不汗則泄所謂勿刺者有死徵也無刺病與脈相逆者上工刺未生其次刺未盛其次刺己衰粗工逆此謂之伐形出九卷病可刺證第十三太陽病頭痛至七日自當愈其經音故也若欲作再經者當針足陽明使經不傳則愈太陽病初服桂枝湯而反煩不解者當先刺風池風府乃卻與桂枝湯則愈傷寒腹滿而譫語寸口脈浮而緊者此為肝乘脾名縱當刺期門傷寒發熱嗇嗇惡寒其人大渴欲飲酢漿者其腹必滿而自汗出小便利其病欲解此為肝乘肺名曰橫陽明病下血而譫語此為熱入血室但頭汗出者當刺期門隨其實而瀉之濈然汗出者則愈婦人中風發熱惡寒經水適來得之七八日熱除脈遲身涼胸脅下滿如結胸狀其人譫語此為熱入血室當刺期門隨其虛實而取之平病云熱入血室無犯胃氣及上三焦與此相反豈謂藥不謂針耶太陽與少陽並病頭痛頸項強而眩時如結胸心下痞堅當刺大杼第一間肺俞肝俞慎不可發汗發汗則譫語譫語則脈弦譫語五日不止當刺期門少陰病下利便膿血者可刺婦人傷寒懷身腹滿不得小便加從腰以下重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便利則愈傷寒喉痹刺手少陰少陰在腕當小指後動脈是也針入三分補之問曰病有汗出而身熱煩滿煩滿不為汗解者何對曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥也太陽主氣故先受邪少陰與為表裡也得熱則上從之從之則厥治之表裡刺之飲之湯熱病三日氣口靜人迎躁者取之諸陽五十九刺以瀉其熱而出其汗實其陰以補其不足所謂五十九刺者兩手外內側各三凡十二痏五指間各一凡八痏足亦如是頭入發一寸旁三分各三凡六痏更入發三寸邊各五凡十痏耳前後口下項中各一凡六痏巔上一熱病先膚痛窒鼻充面取之皮以第一針五十九苛菌為軫一云苛軫鼻索皮於肺不得索之火火心也熱病嗌乾多飲善驚臥不能安取之膚肉以第六針五十九目眥赤索肉於脾不得索之木木肝也熱病而胸脅痛手足躁取之筋間以第四針針於四達一作逆筋闢目浸索筋於肝不得索之金金肺也熱病數驚瘛瘲而狂取之脈以第四針急瀉有餘者癲疾毛髮去索血一作脈於心不得索之水水腎也熱病而身重骨痛耳聾而好瞑取之骨以第四針五十九骨病食齧牙齒耳清索骨於腎無一本作不得索之土土脾也熱病先身澀旁㪍旁㪍太素作倚煩悶干唇嗌取之以第一針五十九膚脹口乾寒汗熱病頭痛攝攝一作顳顬目脈緊善衄厥熱也取之以第三針視有餘不足寒熱病熱病體重腸中熱取之以第四針於其輸及下諸指間索氣於胃絡得氣也熱病挾臍痛急胸脅支滿取之湧泉與太陰陽明一云陰陵泉以第四針針嗌裡熱病而汗且出反脈順可汗者取之魚際太淵大都太白瀉之則熱去補之則汗出汗出太甚者取踝上橫文以止之熱病七日八日脈口動喘而眩者急刺之汗且自出淺刺手大指間熱病先胸脅痛手足躁刺足少陽補手太陰病甚為五十九刺熱病先手臂痛刺手陽明太陰而汗出止熱病始於頭首者刺項太陽而汗出止熱病先身重骨痛耳聾目瞑刺足少陰病甚為五十九刺一云刺少陽熱病先眩冒而熱胸脅滿刺足少陰少陽熱病始足脛者先取足陽明而汗出病不可水證第十四發汗後飲水多者必喘以水灌之亦喘傷寒大吐大下之極虛復極汗者其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也陽明病潮熱微堅可與承氣湯不堅勿與之若不大便六七日恐有燥屎欲知之法可與小承氣湯若腹中不轉失氣者此為但頭堅後溏不可攻之攻之必腹滿不能食欲飲水者即噦陽明病若胃中虛冷其人不能食飲水即噦下利其脈浮大此為虛以強下之故也設脈浮革因爾腸鳴當溫之與水即噦病在陽當以汗解而反以水噀之若灌之其熱卻不得去益煩皮上粟起意欲飲水反不渴宜文蛤散若不瘥與五苓散若寒實結胸無熱證者與三物小陷胸湯白散亦可身熱皮粟不解欲引衣自覆若以水噀之洗之益令熱卻不得出當汗而不汗即煩假令汗出已腹中痛與芍藥三兩如上法寸口脈浮大醫反下之此為大逆浮即無血大即為寒寒氣相搏即為腸鳴醫乃不知而反飲水令汗大出水得寒氣冷必相搏其人即䭇寸口脈濡而弱濡即惡寒弱即發熱濡弱相搏臟氣衰微胸中苦煩此非結熱而反薄居水漬布冷銚貼之陽氣遂微諸腑無所依陰脈凝聚結在心下而不肯移胃中虛冷水穀不化小便縱通復不能多微則可救聚寒心下當奈何也病可水證第十五太陽病發汗後若大汗出胃中乾燥煩不得眠其人欲飲水當稍飲之令胃中和則愈厥陰病渴欲飲水者與水飲之即愈太陽病寸口緩關上小浮尺中弱其人發熱而汗出復惡寒不嘔但心下痞者此為醫下也若不下其人復不惡寒而渴者為轉屬陽明小便數者大便即堅不更衣十日無所苦也欲飲水者但與之當以法救渴宜五苓散寸口脈洪而大數而滑洪大則榮氣長滑數則胃氣實榮長則陽盛怫鬱不得出身胃實則堅難大便則乾燥三焦閉塞津液不通醫發其汗陽盛不周復重下之胃燥熱畜大便遂擯小便不利榮衛相搏心煩發熱兩眼如火鼻乾面赤舌燥齒黃焦故大渴過經成壞病針藥所不能制與水灌枯槁陽氣微散身寒溫衣覆汗出表裡通然其病即除形脈多不同此愈非法治但醫所當慎妄犯傷榮衛霍亂而頭痛發熱身體疼痛熱多欲飲水屬五苓散嘔吐而病在膈上後必思水者急與豬苓散飲之水亦得也病不可火證第十六太陽中風以火劫發其汗邪風被火熱血氣流泆失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛小便難陰陽俱虛竭身體則枯燥但頭汗出齊頸而還腹滿而微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾循衣摸床小便利者其人可治太陽病醫發其汗遂發熱而惡寒復下之則心下痞此表裡俱虛陰陽氣並竭無陽則陰獨復加火針因而煩面色青黃膚瞤如此者為難治今色微黃手足溫者愈傷寒加溫針必驚陽脈浮陰脈弱則血虛血虛則筋傷其脈沉者榮氣微也其脈浮而汗出如流珠者衛氣衰也榮氣微加燒針血留不行更發熱而躁煩也傷寒脈浮而醫以火迫劫之亡陽驚狂臥起不安屬桂枝去芍藥加蜀漆牡蠣龍骨救逆湯問曰得病十五十六日身體黃下利狂欲走師脈之言當下清血如豚肝乃愈後如師言何以知之師曰寸口脈陽浮陰濡弱陽浮則為風陰濡弱為少血浮虛受風少血發熱惡寒灑淅項強頭眩醫加火熏郁令汗出惡寒遂甚客熱因火而發怫鬱蒸肌膚身目為黃小便微難短氣從鼻出血而復下之胃無津液泄利遂不止熱瘀在膀胱畜結成積聚狀如豚肝當下未下心亂迷憒狂走赴水不能自制畜血若去目明心了此皆醫所為無他禍患微輕得愈極者不治傷寒其脈不弦緊而弱者必渴被火必譫言弱者發熱脈浮解之當汗出愈太陽病以火熏之不得汗其人必躁到經不解必有清血陽明病被火額上微汗出而小便不利必發黃陽明病其脈浮緊咽乾口苦腹滿而喘發熱汗出而不惡寒反偏惡熱其身體重發其汗則躁心憒憒而反譫語加溫針必怵惕又煩躁不得眠少陰病咳而下利譫語是為被火氣劫故也少便必難為強責少陰汗出太陽病二日而燒瓦尉其背大汗出火氣入胃胃中竭燥必發譫語十餘日振而反汗出者此為欲解其汗從腰以下不得汗其人欲小便反不得嘔欲失溲足下惡風大便堅者小便當數而反不數及多便已其頭卓然而痛其人足心必熱穀氣下流故也病可火證第十七下利穀道中痛當溫之以為宜熬木鹽尉之一方炙枳實尉之熱病陰陽交併少陰厥逆陰陽竭盡生死證第十八問曰溫病汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何對曰名曰陰陽交交者死人所以汗出者生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝精勝則當能食而不復熱熱者邪氣也汗者精氣也今汗出而輒復熱者邪勝也不能食者精無俾也汗而熱留者壽可立而傾也夫汗出而脈尚躁盛者死此今脈不與汗相應此不勝其病也狂言者是失志失志者死有三死不見一生雖愈必死熱病已得汗而脈尚躁盛此陽脈之極也死其得汗而脈靜者生也熱病脈尚躁盛而不得汗者此陽脈之極也死脈躁盛得汗者生也熱病已得汗而脈尚躁喘且復熱勿膚刺喘甚者死熱病陰陽交者死熱病煩已而汗脈當靜太陽病脈反躁盛者是陰陽交死復得汗脈靜者生熱病陰陽交者熱煩身躁太陰寸口脈兩沖尚躁盛是陰陽交死得汗脈靜者生熱病陽進陰退頭獨汗出死陰進陽退腰以下至足汗出亦死陰陽俱進汗出已熱如故亦死陰陽俱退汗出已寒栗不止鼻口氣冷亦死上熱病陰陽交部熱病所謂並陰者熱病已得汗因得泄是謂並陰故治治一作活熱病所謂並陽者熱病已得汗脈尚躁盛大熱汗之雖不汗出若衄是謂並陽故治上熱病並陰陽部少陰病惡寒蜷而利手足逆者不治少陰病下利止而眩時時自冒者死少陰病其人吐利躁逆者死少陰病四逆惡寒而蜷其脈不至其人不煩而躁者死少陰病六七日其人息高者死少陰病脈微細沉但欲臥汗出不煩自欲吐五六日自利復煩躁不得臥寐者死少陰病下利若利止惡寒而蜷手足溫者可治少陰病惡寒而蜷時時自煩欲去其衣被者可治少陰病下利止厥逆無脈干煩一本作乾嘔服湯藥其脈暴出者死微細者生上少陰部傷寒六七日其脈微手足厥煩躁灸其厥陰厥不還者死傷寒下利厥逆躁不能臥者死傷寒發熱下利至厥不止者死傷寒厥逆六七日不利便發熱而利者生其人汗出利不止者死但有陰無陽故也傷寒五六日不結胸腹濡脈虛復厥者不可下下之亡血死傷寒發熱而厥七日下利者為難治上厥逆部熱病不知所痛不能自收口乾陽熱甚陰頗有寒者熱在髓死不治熱病在腎令人渴口乾舌焦黃赤晝夜欲飲不止腹大而脹尚不厭飲目無精光死不治脾傷即中風陰陽氣別離陰不從陽故以三分候其死生傷寒咳逆上氣其脈散者死謂其人形損故也傷寒下利日十餘行其人脈反實者死病者脅下素有痞而不在臍旁痛引少腹入陰挾陰筋此為臟結死夫實則譫語虛則鄭聲鄭聲者重語是也直視譫語喘滿者死若下利者亦死結胸證悉具而躁者死吐舌下卷者死唾如膠者難解舌頭四邊徐有津液此為欲解病者至經上唇有色脈自和為欲解色急者未解上陰陽竭盡部重實重虛陰陽相附生死證第十九問曰何謂虛實對曰邪氣盛則實精氣奪則虛重實者肉大熱病氣熱脈滿是謂重實問曰經絡俱實何如對曰經絡皆實是寸脈急而尺緩也皆當俱治故曰滑則順澀則逆夫虛實者皆從其物類始五臟骨肉滑利可以長久寒氣暴上脈滿實實而滑順則生實而澀逆則死形盡滿脈急大堅尺滿而不應順則生逆則死所謂順者手足溫所謂逆者手足寒也問曰何謂重虛對曰脈虛氣虛尺虛是謂重虛也所謂氣虛者言無常也尺虛者行步匡然也脈虛者不象陰也如此者滑則生澀則死氣虛者肺虛也氣逆者足寒也非其時則生當其時則死餘臟皆如此也脈實滿手足寒頭熱者春秋則生冬夏則死脈浮而澀澀而身有熱者死絡氣不足經氣有餘脈熱而尺寒秋冬為逆春夏為順經虛絡滿者尺熱滿而寒澀春夏死秋冬生絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽問曰秋冬無極陰春夏無極陽何謂也對曰無極陽者春夏無數虛陽明陽明虛則狂無極陰者秋冬無數虛太陰太陰虛則死上重實重虛部熱病所謂陽附陰者腰以下至足熱腰以上寒陰氣下爭還心腹滿者死所謂陰附陽者腰以上至頭熱腰以下寒陽氣上爭還得汗者生上陰陽相附部熱病生死期日證第二十太陽之脈色榮顴骨熱病也榮未夭曰今且得汗待時自已與厥陰脈爭見者死期不過三日其熱病氣內連腎少陽之脈色榮頰前熱病也榮未夭曰今且得汗待時自已與少陰脈爭見者死期不過三日熱病七八日脈微小病者溲血口中乾一日半而死脈代者一日死熱病七八日脈不躁喘不數後三日中有汗三日不汗四日死未曾汗勿膚刺膚一作庸熱病三四日脈不喘其動均者身雖煩熱今自得汗生傳曰始腑入臟終陰復還陽故得汗熱病七八日脈不喘其動均者生微熱在陽不入陰今自汗也熱病七八日脈不喘動數均者病當喑期三日不得汗四日死熱病身面盡黃而腫心熱口乾舌卷焦黃黑身麻臭伏毒傷肺中脾者死熱病瘛瘲狂言不得汗瘛瘲不止伏毒傷肝中膽者死熱病汗不出出不至足嘔膽吐血善驚不得臥伏毒在肝腑足少陽者死熱病十逆死證第二十一熱病腹滿䐜脹身熱者不得大小便脈澀小疾一逆見死熱病腸鳴腹滿四肢清泄注脈浮大而洪不已二逆見死熱病大衄不止腹中痛脈浮大絶喘而短氣三逆見死熱病嘔且便血奪形肉身熱甚脈絶動疾四逆見死熱病咳喘悸眩身熱脈小疾奪形肉五逆見死熱病腹大而脹四肢清奪形肉短氣六逆見一旬內死熱病腹脹便血脈大時時小絶汗出而喘口乾舌焦視不見人七逆見一旬死熱病身熱甚脈轉小咳而便血目眶陷妄言手循衣縫口乾躁擾不得臥八逆見一時死熱病瘛瘲狂走不能食腹滿胸痛引腰臍背嘔血九逆見一時死熱病嘔血喘咳煩滿身黃其腹鼓脹泄不止脈絶十逆見一時死熱病五臟氣絶死日證第二十二熱病肺氣絶喘逆咳唾血手足腹腫面黃振栗不能言語死魄與皮毛俱去故肺先死丙日篤丁日死熱病脾氣絶頭痛嘔宿汁不得食嘔逆吐血水漿不得入狂言譫語腹大滿四肢不收意不樂死脈與肉氣俱去故脾先死甲日篤乙日死熱病心主氣絶煩滿骨痛一作瘛嗌腫不可咽欲咳不能咳歌哭而笑死神與榮脈俱去故心先死壬日篤癸日死熱病肝氣絶僵仆足不安地嘔血恐懼灑淅惡寒血妄出遺屎溺死魂與筋血俱去故肝先死庚日篤辛日死熱病腎氣絶喘悸吐逆腫疽尻癰目視不明骨痛短氣喘滿汗出如珠死精與骨髓俱去故腎先死戊日篤巳日死故外見瞳子青小爪甲枯發墮身澀齒挺而垢人皮面厚塵黑咳而唾血渴欲數飲大滿此五臟絶表病也熱病至脈死日證第二十三熱病脈四至三日死脈四至者平人一至病人脈四至也熱病脈五至一日死時一大至半日死忽忽悶亂者死熱病脈六至半日死忽急疾大至有頃死熱病脈損日死證第二十四熱病脈四損三日死所謂四損者平人四至病人脈一至名曰四損熱病脈五損一日死所謂五損者平人五至病人脈一至名曰五損熱病脈六損一時死所謂六損者平人六至病人脈一至名曰六損若絶不至或久乃至立死治傷寒形證所宜進退晉王叔和集仲景評脈要論
