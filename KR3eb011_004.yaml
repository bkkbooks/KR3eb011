body:
  text: 卷四辨三部九候脈證第一經言所謂三部者寸關尺也九候者每部中有天地人也上部主候從胸以上至頭中部主候從膈以下至氣街下部主候從氣街以下至足浮沉牢結遲疾滑澀各自異名分理察之勿怠觀變所以別三部九候知病之所起審而明之針灸亦然也故先候脈寸中寸中一作寸中於九浮在皮膚沉細在裡昭昭天道可得長久上部之候牢結沉滑有積氣在膀胱微細而弱臥引裡急頭痛咳嗽逆氣上下心膈上有熱者口乾渴燥病從寸口邪入上者名曰解脈來至狀如琴絃苦少腹痛女子經月不利孔竅生瘡男子病痔左右脅下有瘡上部不通者苦少腹痛腸鳴寸口中虛弱者傷氣氣不足大如桃李實苦痹也寸口直上者逆虛也如浮虛者泄利也中部脈結者腹中積聚若在膀胱兩脅下有熱脈浮而大風從胃脘入水脹乾嘔心下澹澹如有桃李核胃中有寒時苦煩痛不食食即心痛胃脹支滿膈上積脅下有熱時寒熱淋露脈橫出上者脅氣在膀胱病即著右橫關入寸口中者膈中不通喉中咽難刺關元入少陰下部脈者其脈來至浮大者脾也與風集合時上頭痛引腰背小滑者厥也足下熱煩滿逆上搶心上至喉中狀如惡肉脾傷也病少腹下在膝諸骨節間寒清不可屈伸脈急如弦者筋急足攣結者四肢重從尺邪入陽明者寒熱也大風邪入少陰女子漏白下赤男子溺血陰萎不起引少腹痛人有三百六十脈法三百六十日三部者寸關尺也尺脈為陰陰脈常沉而遲寸關為陽陽脈俱浮而速氣出為動入為息故陽脈六息七息十三投陰脈八息七息十五投此其常也二十八脈相逐上下一脈不來知疾所苦尺勝治下寸勝治上尺寸俱平治中央臍以上陽也法於天臍以下陰也法於地臍為中關頭為天足為地有表無里邪之所止得鬼病何謂表裡寸尺為表關為里兩頭有脈關中絕不至也尺脈上不至關為陰絕寸脈下不至關為陽絕陰絕而陽微死不治三部脈或至或不至冷氣在胃中故令脈不通也上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無所苦所以然者譬如人之有尺樹之有根雖枝葉枯槁根本將自生木有根本即自有氣故知不死也寸口脈平而死者何也然諸十二經脈者皆繫於生氣之原所謂生氣之原者非謂十二經之根本也謂腎間動氣也此五臟六腑之本十二經之根呼吸之門三焦之原一名守邪之神也故氣者人根本也根絕則莖枯矣寸口脈平而死者生氣獨絕於內也腎間動氣謂左為腎右為命門命門者精神之所舍原氣之所繫也一名守邪之神以命門之神固守邪氣不得妄入入即死矣此腎氣先絕於內其人便死其脈不復反得動病也岐伯曰形盛脈細少氣不足以息者死形瘦脈大胸中多氣者死形氣相得者生參伍不調者病三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右相失不可數者死中部之候雖獨調與眾臟相失者死中部之候相減者死目內陷者死黃帝曰冬陰夏陽奈何岐伯曰九候之脈皆沉細懸絕者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死是故寒熱者平旦死熱中及熱病者日中死病風者以日夕死病水者以夜半死其脈乍數乍疏乍遲乍疾者以日乘四季死形肉已脫九候雖調猶死七診雖見九候皆順者不死所言不死者風氣之病及經月之病似七診之病而非也故言不死若有七診之病其脈候亦敗者死矣必發噦噫必審問其所始病與今之所方病而後各切循其脈視其經絡浮沉以上下逆順循之其脈疾者不病其脈遲者病脈不往來者死皮膚著者死兩手脈結上部者濡結中部者緩結三里者豆起弱反在關濡反在巔微在其上澀反在下微即陽氣不足沾熱汗出澀即無血厥而且寒黃帝問曰余每欲視色持脈獨調其尺以言其病從外知內為之奈何岐伯對曰審其尺之緩急小大滑澀肉之堅脆而病形變定矣調之何如對曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚減而少脈大者尺之皮膚亦大脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀凡此六變有微有甚故善調尺者不待於寸善調脈者不待於色能參合行之可為上工尺膚滑以淖澤者風也尺內弱解㑊安臥脫肉者寒熱也尺膚澀者風痹也尺膚粗如枯魚之鱗者水淡飲也尺膚熱甚脈盛躁者病溫也其脈盛而滑者汗且出尺膚寒甚脈小一作急者泄少氣尺膚烜然烜然甲乙作熱炙人手先熱後寒者寒熱也尺膚先寒久持之而熱者亦寒熱也尺烜然熱人迎大者嘗奪血尺緊人迎脈小甚則少氣色白有加者立死肘所獨熱者腰以上熱肘前獨熱者膺前熱肘後獨熱者肩背熱肘後粗以下三四寸腸中有蟲手所獨熱者腰以上熱臂中獨熱者腰腹熱掌中熱者腹中熱掌中寒者腹中寒魚上白肉有青血脈者胃中有寒諸浮諸沉諸滑諸澀諸弦諸緊若在寸口膈以上病若在關上胃以下病若在尺中腎以下病寸口脈滑而遲不沉不浮不長不短為無病左右同法寸口太過與不及寸口之脈中手短者曰頭痛中手長者曰足脛痛中手促上擊者曰肩背痛寸口脈浮而盛者病在外寸口脈沉而堅者病在中寸口脈沉而弱者曰寒熱一作氣又作中及疝瘕少腹痛寸口脈沉而弱發必墮落寸口脈沉而緊苦心下有寒時痛有積聚寸口脈沉胸中短氣寸口脈沉而喘者寒熱寸口脈但實者心勞寸口脈緊或浮膈上有寒肺下有水氣脈緊而長過寸口者注病脈緊上寸口者中風風頭痛亦如之千金翼云亦為傷寒頭痛脈弦上寸口者宿食降者頭痛脈來過寸入魚際者遺尿脈出魚際逆氣喘息寸口脈潎潎如羹上肥陽氣微連連如蜘蛛絲陰氣衰寸口脈偏絕則臂偏不遂其人兩手俱絕者不可治兩手前部陽絕者苦心下寒毒喙中熱關上脈浮而大風在胃中張口肩息心下澹澹食欲嘔關上脈微浮積熱在胃中嘔吐蛔蟲心健忘關上脈滑而大小不勻千金云必吐逆是為病方欲進不出一二日復欲發動其人慾多飲飲即注利如利止者生不止者死關上脈緊而滑者蛔動關上脈澀而堅大而實按之不減有力為中焦實有伏結在脾肺氣塞實熱在胃中關上脈襜襜大而尺寸細者其人必心腹冷積癥瘕結聚欲熱飲食關上脈時來時去乍大乍小乍疏乍數者胃中寒熱羸劣不欲飲食如瘧狀尺脈浮者客陽在下焦尺脈細微溏泄下冷利尺脈弱寸強胃絡脈傷尺脈虛小者足脛寒痿痹腳疼尺脈澀下血不利多汗素問又云尺澀脈滑謂之多汗尺脈滑而疾為血虛尺脈沉而滑者寸白蟲尺脈細而急者筋攣痹不能行尺脈粗常熱者謂之熱中腰胯疼小便赤熱尺脈偏滑疾面赤如醉外熱則病平雜病脈第二滑為實為下又為陽氣衰數為虛為熱浮為風為虛動為痛為驚沉為水為實又為鬼疰弱為虛為悸遲則為寒澀則少血緩則為虛洪則為氣一作熱緊則為寒弦數為瘧瘧脈自弦弦數多熱弦遲多寒微則為虛代散則死弦為痛痹一作浮為風疰偏弦為飲雙弦則脅下拘急而痛其人澀澀惡寒脈大寒熱在中伏者霍亂安臥脈盛謂之脫血凡亡汗肺中寒飲冷水咳嗽下利胃中虛冷此等其脈並緊浮而大者風浮大者中風頭重鼻塞浮而緩皮膚不仁風寒入肌肉滑而浮散者攤緩風滑者鬼疰澀而緊痹病浮洪大長者風眩癲疾大堅疾者癲病弦而鉤脅下如刀刺狀如蜚屍至困不死緊而急者遁屍洪大者傷寒熱病浮洪大者傷寒秋吉春成病浮而滑者宿食浮滑而疾者食不消脾不磨短疾而滑酒病浮而細滑傷飲遲而澀中寒有癥結快而緊積聚有擊痛弦急疝瘕小腹痛又為癖病一作痹病遲而滑者脹盛而緊曰脹弦小者寒癖沉而弦者懸飲內痛弦數有寒飲冬夏難治緊而滑者吐逆小弱而澀胃反遲而緩者有寒微而緊者有寒沉而遲腹臟有冷病微弱者有寒少氣實緊胃中有寒苦不能食時時利者難治一作時時嘔稽留難治滑數心下結熱盛滑疾胃中有熱緩而滑曰熱中沉一作浮而急病傷寒暴發虛熱浮而絕者氣闢大而滑中有短氣浮短者其人肺傷諸氣微少不過一年死法當嗽也沉而數中水冬不治自愈短而數心痛心煩弦而緊脅痛臟傷有瘀血一作有寒血沉而滑為下重亦為背膂痛脈來細而滑按之能虛因急持直者僵仆從高墮下病在內微浮秋吉冬成病微數雖甚不成病不可勞浮滑疾緊者以合百病人易愈陽邪來見浮洪陰邪來見沉細水穀來見堅實脈來乍大乍小乍長乍短者為崇脈來洪大嫋嫋者社崇脈來沉沉澤澤四肢不仁而重土崇脈與肌肉相得久持之至者可下之弦小緊者可下之緊而數寒熱俱發必下乃愈弦遲者宜溫藥緊數者可發其汗診五臟六腑氣絕證候第三病人肝絕八日死何以知之面青但欲伏眠目視而不見人汗一作泣出如水不止一曰二日死病人膽絕七日死何以知之眉為之傾病人筋絕九日死何以知之手足爪甲青呼罵不休一曰八日死病人心絕一日死何以知之肩息回視立死一曰目亭亭一日死病人腸一云小腸絕六日死何以知之髮直如干麻不得屈伸白汗不止病人脾絕十二日死何以知之口冷足腫腹熱臚脹泄利不覺出無時度一曰五日死病人胃絕五日死何以知之脊痛腰中重不可反覆一曰腓腸平九日死病人肉絕六日死何以知之耳干舌皆腫溺血大便赤泄一曰足腫九日死病人肺絕三日死何以知之口張但氣出而不還一曰鼻口虛張短氣病人大腸絕不治何以知之泄利無度利絕則死病人腎絕四日死何以知之齒為暴枯面為正黑目中黃色腰中欲折白汗出如流水一曰人中平七日死病人骨絕齒黃落十日死諸浮脈無根者皆死以上五臟六腑為根也診四時相反脈證第四春三月木王肝脈治當先至心脈次之肺脈次之腎脈次之此為四時王相順脈也到六月土王脾脈當先至而反不至反得腎脈此為腎反脾也七十日死何謂腎反脾夏火王心脈當先至肺脈次之而反得腎脈是謂腎反脾期五月六月忌丙丁脾反肝三十日死何謂脾反肝春肝脈當先至而反不至脾脈先至是謂脾反肝期正月二月忌甲乙腎反肝三歲死何謂腎反肝春肝脈當先至而反不至腎脈先至是謂腎反肝也期七月八月忌庚辛腎反心二歲死何謂腎反心夏心脈當先至而反不至腎脈先至是謂腎反心也期六月忌戊己臣億等按千金云此中不論肺金之氣疏略未論指南又推五行亦頗顛倒待求別錄也診損至脈第五脈有損至何謂也然至之脈一呼再至曰平三至曰離經四至曰奪精五至曰死六至曰命絕此至之脈也何謂損一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絕此損之脈也至脈從下上損脈從上下也損脈之為病奈何然一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑也三損損於肌肉肌肉消瘦食飲不為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床反此者至於收病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死治損之法奈何然損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精氣此治損之法也脈有一呼再至一吸再至一呼三至一吸三至一呼四至一吸四至一呼五至一吸五至一呼六至一吸六至一呼一至一吸一至再呼一至再吸一至呼吸再至脈來如此何以別知其病也然脈來一呼再至一吸再至不大不小曰平一呼三至一吸三至為適得病前大後小即頭痛目眩前小後大即胸滿短氣一呼四至一吸四至病適欲甚脈洪大者苦煩滿沉細者腹中痛滑者傷熱澀者中霧露一呼五至一吸五至其人當困沉細即夜加浮大即晝加不大小雖困可治其有大小者為難治一呼六至一吸六至為十死脈也沉細夜死浮大晝死一呼一至一吸一至名曰損人雖能行猶當一作猶未著床所以然者血氣皆不足故也再呼一至再吸一至名曰無魂無魂者當死也人雖能行名曰行屍扁鵲曰脈一出一入曰平再出一入少陰三出一入太陰四出一入厥陰再入一出少陽三入一出陽明四入一出太陽脈出者為陽入者為陰故人一呼而脈再動氣行三寸一吸而脈再動氣行三寸呼吸定息脈五動一呼一吸為一息氣行六寸人十息脈五十動氣行六尺二十息脈百動為一備之氣以應四時天有三百六十五日人有三百六十五節晝夜漏下水百刻一備之氣脈行丈二尺一日一夜行於十二辰氣行盡則周遍於身與天道相合故曰平平者無病也一陰一陽是也脈再動為一至再至而緊即奪氣一刻百三十五息十刻千三百五十息百刻萬三千五百息二刻為一度一度氣行一周身晝夜五十度脈三至者離經一呼而脈三動氣行四寸半人一息脈七動氣行九寸十息脈七十動氣行九尺一備之氣脈百四十動氣行一丈八尺一周於身氣過百八十度故曰離經離經者病一陰二陽是也三至而緊則奪血脈四至則奪精一呼而脈四動氣行六寸人一息脈九動氣行尺二寸人十息脈九十動氣行一丈二尺一備之氣脈百八十動氣行二丈四尺一周於身氣過三百六十度再遍於身不及五節一時之氣而重至諸脈浮澀者五臟無精難治一陰三陽是也四至而緊則奪形脈五至者死一呼而脈五動氣行六寸半當行七寸半人一息脈十一動氣行尺三寸當行尺五寸人十息脈百一十動氣行丈三尺當行丈五尺一備之氣脈二百二十動氣行二丈六尺當行三丈一周於身三百六十五節氣行過五百四十度再周於身過百七十度一節之氣而至此氣浮澀經行血氣竭盡不守於中五臟痿痟精神散亡脈五至而緊則死三陰一作二三陽是也雖五猶末如之何也脈一損一乘者人一呼而脈一動人一息而脈再動氣行三寸十息脈二十動氣行三尺一備之氣脈四十動氣行六尺不及周身百八十節氣短不能周遍於身苦少氣身體懈墮矣脈再損者人一息而脈一動氣行一寸五分人十息脈十動氣行尺五寸一備之氣脈二十動氣行三尺不及周身二百節疑氣血盡經中不能及故曰離經血去不在其處小大便皆血也脈三損者人一息復一呼而脈一動十息脈七動氣行尺五寸當行尺五分一備之氣脈十四動氣行三尺一寸當行二尺一寸不及周身二百九十七節故曰爭氣行血留不能相與俱微氣閉實則胸滿臟枯而爭於中其氣不朝血凝於中死矣脈四損者再息而脈一動人十息脈五動氣行七寸半一備之氣脈十動氣行尺五寸不及周身三百一十五節故曰亡血亡血者忘失其度身羸疲皮裹骨故氣血俱盡五臟失神其死明矣脈五損者人再息復一呼而脈一動人十息脈四動氣行六寸一備之氣脈八動氣行尺二寸不及周身三百二十四節故曰絕絕者氣急不下床口氣寒脈俱絕死矣岐伯曰脈失四時者為至啟至啟者為損至之脈也損之為言少陰主骨為重此志損也飲食衰減肌肉消者是意損也身安臥臥不便利耳目不明是魂損也呼吸不相通五色不華是魄損也四肢皆見脈為亂是神損也大損三十歲中損二十歲下損十歲損各以春夏秋冬平人人長脈短者是大損三十歲人短脈長者是中損二十歲手足皆細是下損十歲失精氣者一歲而損男子左脈短右脈長是為陽損半歲女子右脈短左脈長是為陰損半歲春脈當得肝脈反得脾肺之脈損夏脈當得心脈反得腎肺之脈損秋脈當得肺脈反得肝心之脈損冬脈當得腎脈反得心脾之脈損當審切寸口之脈知絕不絕前後去為絕掌上相擊堅如彈石為上脈虛盡下脈尚有是為有胃氣上脈盡下脈堅如彈石為有胃氣上下脈皆盡者死不絕不消者皆生是損脈也至之為言言語音深遠視憒憒是志之至也身體粗大飲食暴多是意之至也語言妄見手足相引是魂之至也蘢蔥華色是魄之至也脈微小不相應呼吸自大是神之至也是至脈之法也死生相應病各得其氣者生十得其半也黃帝曰善診脈動止投數疏數死期年月第六脈一動一止二日死一經云一日死二動一止三日死三動一止四日死或五日死四動一止六日死五動一止五日死或七日死六動一止八日死七動一止九日死八動一止十日死九動一止九日死又云十一日死一經云十三日死若立春死十動一止立夏死一經云立春死十一動一止夏至死一經云立夏死一經云立秋死十二十三動一止立秋死一經云立冬死十四十五動一止立冬死一經云立夏死二十動一止一歲死若立秋死二十一動一止二歲死二十五動一止立冬死一經云一歲死或二歲死三十動一止二歲若三歲死三十五動一止三歲死四十動一止四歲死五十動一止五歲死不滿五十動一止五歲死脈來五十投而不止者五臟皆受氣即無病千金方云五行氣畢陰陽數同榮衛出入經脈通流晝夜百刻五德相生脈來四十投而一止者一臟無氣卻後四歲春草生而死脈來三十投而一止者二臟無氣卻後三歲麥熟而死脈來二十投而一止者三臟無氣卻後二歲桑椹赤而死脈來十投而一止者四臟無氣歲中死得節不動出清明日死遠不出穀雨死矣脈來五動而一止者五臟無氣卻後五日而死脈一來而久住者宿病在心主中治脈二來而久住者病在肝枝中治脈三來而久住者病在脾下中治脈四來而久住者病在腎間中治脈五來而久住者病在肺支中治五脈病虛羸人得此者死所以然者藥不得而治針不得而及盛人可治氣全故也診百病死生訣第七診傷寒熱盛脈浮大者生沉小者死傷寒已得汗脈沉小者生浮大者死溫病三四日以下不得汗脈大疾者生脈細小難得者死不治溫病穰穰大熱其脈細小者死千金穰穰作時行溫病下利腹中痛甚者死不治溫病汗不出出不至足者死厥逆汗出脈堅強急者生虛緩者死溫病二三日身體熱腹滿頭痛食飲如故脈直而疾者八日死四五日頭痛腹痛而吐脈來細強十二日死八九日頭不疼身不痛目不赤色不變而反利脈來牒牒按之不彈手時大心下堅十七日死熱病七八日脈不軟一作喘不散一作數者當喑喑後三日溫汗不出者死熱病七八日其脈微細小便不利加暴口燥脈代舌焦乾黑者死熱病未得汗脈盛躁疾得汗者生不得汗者難瘥熱病已得汗脈靜安者生脈躁者難治熱病已得汗常大熱不去者亦死大一作專熱病已得汗熱未去脈微躁者慎不得刺治熱病發熱熱甚者其脈陰陽皆竭慎勿刺不汗出必下利診人被風不仁痿蹶其脈虛者生堅急疾者死診癲病虛則可治實則死癲疾脈實堅者生脈沉細小者死癲疾脈摶大滑者久久自已其脈沉小急實不可治小堅急亦不可療診頭痛目痛久視無所見者死久視一作卒視診人心腹積聚其脈堅強急者生虛弱者死又實強者生沉者死其脈大腹大脹四肢逆冷其人脈形長者死腹脹滿便血脈大時絕極下血脈小疾者死心腹痛痛不得息脈細小遲者生堅大疾者死腸澼便血身熱則死寒則生腸澼下白沫脈沉則生浮則死腸澼下膿血脈懸絕則死滑大則生腸澼之屬身熱脈不懸絕滑大者生懸澀者死以臟期之腸澼下膿血脈沉小流連者生數疾且大有熱者死腸澼筋攣其脈小細安靜者生浮大緊者死洞泄食不化不得留下膿血脈微小連者生緊急者死泄注脈緩時小結者生浮大數者死䘌蝕陰疘其脈虛小者生緊急者死咳嗽脈沉緊者死浮直者生浮軟者生小沉伏匿者死咳嗽羸瘦脈形堅大者死咳脫形發熱脈小堅急者死肌瘦下一本云不脫形熱不去者死咳而嘔腹脹且泄其脈弦急欲絕者死吐血衄血脈滑小弱者生實大者死汗出若衄其脈小滑者生大躁者死唾血脈緊強者死滑者生吐血而咳上氣其脈數有熱不得臥者死上氣脈數者死謂其形損故也上氣喘息低昂其脈滑手足溫者生脈澀四肢寒者死上氣面浮腫肩息其脈大不可治加利必死一作又甚上氣注液其脈虛寧寧伏匿者生堅強者死寒氣上攻脈實而順滑者生實而逆澀則死太素云寒氣暴上脈滿實何如曰實而滑則生實而逆則死矣其形盡滿何如曰舉形盡滿者脈急大堅尺滿而不應如是者順則生逆則死何謂順則生逆則死曰所謂順者手足溫也謂逆者手足寒也痟癉脈實大病久可治脈懸小堅急病久不可治消渴脈數大者生細小浮短者死消渴脈沉小者生實堅大者死水病脈洪大者可治微細者不可治水病脹閉其脈浮大軟者生沉細虛小者死水病腹大如鼓脈實者生虛者死卒中惡吐血數升脈沉數細者死浮大疾快者生卒中惡腹大四肢滿脈大而緩者生緊大而浮者死緊細而微者亦生病瘡腰脊強急瘛瘲者皆不可治寒熱瘛瘲其脈代絕者死金瘡血出太多其脈虛細者生數實大者死金瘡出血脈沉小者生浮大者死斫瘡出血一二石脈來大二十日死斫刺俱有病多少血出不自止斷者其脈止脈來大者七日死滑細者生從高頓僕內有血腹脹滿其脈堅強者生小弱者死人為百藥所中傷脈浮澀而疾者生微細者死洪大而遲者生千金遲作速人病甚而脈不調者難瘥人病甚而脈洪者易瘥人內外俱虛身體冷而汗出微嘔而煩擾手足厥逆體不得安靜者死脈實滿手足寒頭熱春秋生冬夏死老人脈微陽羸陰強者生脈焱大加息一作如急者死陰弱陽強脈至而代奇一作寄月而死尺脈澀而堅為血實氣虛也其發病腹痛逆滿氣上行此為婦人胞中絕傷有惡血久成結瘕得病以冬時黍穄赤而死尺脈細而微者血氣俱不足細而來有力者是穀氣不充病得節輒動棗葉生而死此病秋時得之左手寸口脈偏動乍大乍小不齊從寸口至關關至尺三部之位處處動搖各異不同其人病仲夏得之此脈桃花落而死花一作葉右手寸口脈偏沉伏乍小乍大朝來浮大暮夜沉伏浮大即太過上出魚際沉伏即下不至關中往來無常時時復來者榆葉枯落而死葉一作英右手尺部脈三十動一止有頃更還二十動一止乍動乍疏連連相因不與息數相應其人雖食谷猶不愈蘩草生而死左手尺部脈四十動而一止止而復來來逆如循直木如循張弓弦絙絙然如兩人共引一索至立冬死千金作至立春而死診三部脈虛實決死生第八三部脈調而和者生三部脈廢者死三部脈虛其人長病得之死虛而澀長病亦死虛而滑亦死虛而緩亦死虛而弦急癲病亦死三部脈實而大長病得之死實而滑長病得之生卒病得之死實而緩亦生實而緊亦生實而緊急癲癇可治三部脈強非稱其人病便死三部脈羸非其人一作脈得之死三部脈粗長病得之死卒病得之生三部脈細而軟長病得之生細而數亦生微而緊亦生三部脈大而數長病得之生卒病得之死三部脈微而伏長病得之死三部脈軟一作濡長病得之不治自愈治之死卒病得之生三部脈浮而結長病得之死浮而滑長病亦死浮而數長病風得之生卒病得之死三部脈芤長病得之生卒病得之死三部脈弦而數長病得之生卒病得之死三部脈革長病得之死卒病得之生三部脈堅而數如銀釵股蠱毒病必死數而軟蠱毒病得之生三部脈潎潎如羹上肥長病得之死卒病得之生三部脈連連如蜘蛛絲長病得之死卒病得之生三部脈如霹靂長病得之死三十日死三部脈如弓弦長病得之死三部脈累累如貫珠長病得之死三部脈如水淹然流長病不治自愈治之反死一云如水流者長病七十日死如水不流者長病不治自愈三部脈如屋漏長病十日死千金云十四日死三部脈如雀啄長病七日死三部脈如釜中湯沸朝得暮死夜半得日中死日中得夜半死三部脈急切腹間病又婉轉腹痛針上下瘥
