body:
  text: 卷三肝膽部第一肝象木肝於五行象木與膽合為腑膽為清淨之腑其經足厥陰厥陰肝脈與足少陽為表裡少陽膽脈也臟陰腑陽故為表裡其脈弦弦肝脈之大形也其相冬三月冬水王木相王春三月廢夏三月夏火王木廢囚季夏六月季夏土王木囚死秋三月秋金王木死其王日甲乙王時平旦日出並木也其困日戊己困時食時日昳並土也其死日庚辛死時晡時日入並金也其神魂肝之所藏者魂其主色其養筋肝氣所養者筋其候目肝候出目故肝實則目赤其聲呼其色青其臭臊月令云其臭膻其液泣泣出肝其味酸其宜苦苦火味也其惡辛辛金味肝俞在背第九椎募在期門直兩乳下二肋端膽俞在背第十椎募在日月穴在期門下五分上新撰並出素問諸經昔人撰集或混雜相涉煩而難了今抄事要分別五臟各為一部冬至之後得甲子少陽起於夜半肝家王冬至者歲終之節甲子日者陰陽更始之數也少陽膽也膽者木也生於水故起夜半其氣常微少故言少陽云夜半子者水也肝者東方木肝與膽為臟腑故王東方應木行也萬物始生其氣來軟而弱寬而虛春少陽氣溫和軟弱故萬物日生焉故脈為弦肝氣養於筋故其脈弦強亦法木體強也軟即不可發汗弱即不可下寬者開開者通通者利故名曰寬而虛言少陽始起尚軟弱入榮衛腠理開通發即汗出不止不可下下之而泄利不禁故言寬虛通利也春以胃氣為本不可犯也胃者土也萬物稟土而生胃亦養五臟故肝王以胃氣為本也不可犯者不可傷也上四時經黃帝問曰春脈如弦何如而弦岐伯曰春脈肝也東方木也萬物之所以始生也故其氣來濡弱輕虛而滑端直以長故曰弦反此者病黃帝曰何如而反岐伯曰其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中黃帝曰春脈太過與不及其病皆何如岐伯曰太過則令人善忘忘當作怒忽忽眩冒而癲疾不及則令人胸脅痛引背下則兩脅胠滿黃帝曰善肝脈來濡弱招招如揭竿末梢曰平巢源云綽綽如按琴瑟之弦如揭長竿曰平春以胃氣為本肝脈來盈實而滑如循長竿曰肝病肝脈來急而益徑如新張弓弦曰肝死真肝脈至中外急如循刀刃責責然巢源云賾賾然如按琴瑟弦色青白不澤毛折乃死春胃微弦曰平弦多胃少曰肝病但弦無胃曰死有胃而毛曰秋病毛甚曰今病肝藏血血舍魂悲哀動中則傷魂魂傷則狂妄不精不敢正當人不精不敢正當人一作其精不守令人陰縮陰縮而筋攣兩脅骨不舉毛悴色夭死於秋春肝木王其脈弦細而長名曰平脈也反得浮澀而短者千金云微澀而短是肺之乘肝金之剋木為賊邪大逆十死不治一本云日月年數至三忌庚辛反得洪大而散者千金云浮大而洪是心之乘肝子之扶母為實邪雖病自愈反得沉濡而滑者是腎之乘肝母之歸子為虛邪雖病易治反得大而緩者是脾之乘肝土之陵木為微邪雖病即瘥肝脈來濯濯如倚竿如琴瑟之弦再至曰平三至曰離經病四至脫精五至死六至命盡足厥陰脈也肝脈急甚為惡言微急為肥氣在脅下若覆杯緩甚為善嘔微緩為水瘕痹大甚為內癰善嘔衄微大為肝痹縮咳引少腹小甚為多飲微小為消疸滑甚為頽疝微滑為遺溺澀甚為淡飲微澀為瘛瘲攣筋足厥陰氣絶則筋縮引卵與舌厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本故脈弗營則筋縮急筋縮急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也肝死臟浮之脈弱按之中如索不來或曲如蛇行者死上素問針經張仲景心小腸部第二心象火與小腸合為腑小腸為受盛之腑也其經手少陰手少陰心脈也與手太陽為表裡手太陽小腸脈也其脈洪洪心脈之大形其相春三月木王火相王夏三月廢季夏六月囚秋三月金王火囚死冬三月水王火死其王日丙丁王時禺中日中其困日庚辛困時晡時日入其死日壬癸死時人定夜半其藏神心之所藏者神也其主臭其養血心氣所養者血其候舌其聲言言由心出故主言其色赤其臭焦其液汗其味苦其宜甘甘脾味也其惡咸咸腎味也心俞在背第五椎或云第七椎募在巨闕在心下一寸小腸俞在背第十八椎募在關元臍下三寸上新撰心者南方火心主血其色赤故以夏王於南方應火行萬物洪盛垂枝布葉皆下垂如曲故名曰鉤心王之時太陽用事故草木茂盛枝葉布舒皆下垂曲故謂之鉤也心脈洪大而長洪則衛氣實實則氣無從出脈洪者衛氣實衛氣實則腠理密密則氣無從出大則榮氣萌萌洪相薄可以發汗故名曰長榮者血也萌當為明字之誤耳血王故明且大也榮明衛實當鬚髮動通其津液也長洪相得即引水漿溉灌經絡津液皮膚夏熱陽氣盛故其人引水漿潤灌肌膚以養皮毛猶草木須雨澤以長枝葉太陽洪大皆是母軀幸得戊己用牢根株太陽夏火春木為其母陽得春始生名曰少陽到夏洪盛名曰太陽故言是母軀也戊己土也土為火子火王即土相故用牢根株也陽氣上出汗見於頭五月枯鼠邑胞中空虛醫反下之此為重虛也月當為內鼠邑當為干枯燥也皆字誤耳內字似月由來遠矣遂以傳焉人頭者諸陽之會夏時飲水漿上出為汗先從頭流於身軀以實其表是以五內乾枯燥則胞中空虛津液少也胞者膀胱津液之腑也愚醫不曉故反下之令重虛也脈浮有表無里陽無所使陽盛脈浮宜發其汗而反下之損於陰氣陽為表陰為里經言陽為陰使陰為陽守相須而行脈浮故無里也治之錯逆故令陰陽離別不能復相朝使不但危身並中其母言下之不但傷心並復中肝上四時經黃帝問曰夏脈如鉤何如而鉤岐伯曰夏脈心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病黃帝曰何如而反岐伯曰其氣來盛去亦盛此謂太過病在外其來不盛去反盛此謂不及病在中黃帝曰夏脈太過與不及其病皆何如岐伯曰太過則令人身熱而膚痛為浸淫不及則令人煩心上見咳唾下為氣泄帝曰善心脈來纍纍如連珠如循琅玕曰平夏以胃氣為本心脈來喘喘甲乙作纍纍連屬其中微曲曰心病心脈來前曲後居如操帶鉤曰心死真心脈至堅而搏如循薏苡子纍纍然其色赤黑不澤毛折乃死夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病心藏脈脈舍神怵惕思慮則傷神神傷則恐懼自失破㿉脫肉毛悴色夭死於冬夏心火王其脈洪千金作浮大而洪大而散名曰平脈反得沉濡而滑者是腎之乘心水之剋火為賊邪大逆十死不治一本云日月年數至二忌壬癸反得大而緩者是脾之乘心子之扶母為實邪雖病自愈反得弦細而長者是肝之乘心母之歸子為虛邪雖病易治反得浮千金浮作微澀而短者是肺之乘心金之陵火為微邪雖病即瘥心脈來纍纍如貫珠滑利再至曰平三至曰離經病四至脫精五至死六至命盡手少陰脈心脈急甚為瘛瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血大甚為喉介微大為心痹引背善淚出小甚為善噦微小為消疸滑甚為善渴微滑為心疝引臍少腹鳴澀甚為喑微澀為血溢維厥耳鳴巔疾手少陰氣絶則脈不通少陰者心脈也心者脈之合也脈不通則血不流血不流則髮色不澤故其面黑如漆柴者血先死壬篤癸死水勝火也心死臟浮之脈實如豆麻擊手按之益躁疾者死上素問針經張仲景脾胃部第三脾象土與胃合為腑胃為水穀之腑其經足太陰太陰脾之脈也與足陽明為表裡陽明胃脈其脈緩緩脾脈之大形也其相夏三月火王土相王季夏六月廢秋三月囚冬三月死春三月其王日戊己王時食時日昳困日壬癸困時人定夜半其死日甲乙死時平旦日出並木時也其神意其主味其養肉其候口其聲歌其色黃其臭香其液涎其味甘其宜辛其惡酸脾俞在背第十一椎募在章門季肋端是胃俞在背第十二椎募在太倉上新撰脾者土也敦而福敦者厚也萬物衆色不同脾主水穀其氣微弱水穀不化脾為土行王於季夏土性敦厚育養萬物當此之時草木備具枝葉茂盛種類衆多或青黃赤白黑色各不同矣故名曰得福者廣土生養萬物當此之時脾則同稟諸臟故其德為廣大萬物懸根住莖其葉在巔蜎蜚蠕動蚑蠷喘息皆蒙土恩懸根住莖草木之類也其次則蛾蚋幾微之蟲因陰陽氣變化而生者也喘息有血脈之類也言普天之下草木昆蟲無不被蒙土之恩福也德則為緩恩則為遲故令太陰脈緩而遲尺寸不同太陰脾也言脾王之時脈緩而遲尺寸不同者尺遲而寸緩也酸鹹苦辛大一作太沙一作涉又作妙而生互行其時而以各行皆不群行儘可常服肝酸腎咸心苦肺辛澀皆四臟之味也脾主調和五味以稟四臟四臟受味於脾脾王之時其脈沙一作涉又作妙達於肌肉之中互行人身軀乃復各行隨其四肢使其氣周匝榮諸臟腑以養皮毛皆不群行至一處也故言儘可常服也土寒則溫土熱則涼冬陽氣在下土中溫暖夏陰氣在下土中清涼脾氣亦然土有一子名之曰金懷挾抱之不離其身金乃畏火恐熱來熏遂棄其母逃歸水中水自金子而藏火神閉門塞戶內外不通此謂冬時也陽氣在中陽為火行金性畏火故恐熏之金歸水中而避火也母子相得益盛閉塞不通者言水氣充實金在其中此為強固火無復得往克之者神密之類也土亡其子其氣衰微水為洋溢浸漬為池一作其地走擊皮膚面目浮腫歸於四肢此為脾之衰損土以防水今土弱而水強故水得陵之而妄行愚醫見水直往下之虛脾空胃水遂居之肺為喘浮脾胃已病宜扶養其氣通利水道愚醫不曉而往下之此為重傷水氣遂更陵之上侵胸中肺得水而浮故言喘浮肝反畏肺故下沉沒肺金肝木此為相剋肺浮則實必復克肝故畏之沉沒於下下有荊棘恐傷其身避在一邊以為水流荊棘木之類肝為木今沒在下則為荊棘其身脾也脾為土土畏木是以避在下一邊避木也水流者水之流路也土本剋水而今微弱又復觸木無復製水故水得流行心衰則伏肝微則沉故令脈伏而沉心火肝木火則畏水而木畏金金水相得其氣則實克於肝心故令二臟衰微脈為沉伏也工醫來占因轉孔穴利其溲便遂通水道甘液下流亭其陰陽喘息則微汗出正流肝著其根心氣因起陽行四肢肺氣亭亭喘息則安轉孔穴者諸臟之榮並轉治其順甘液脾之津液亭其陰陽得復其常所故榮衛開通水氣消除肝得遠著其根株肝心為母子肝著則心氣得起肺氣平調故言亭亭此為端好之類腎為安聲其味為咸肺主聲腎為其子助於肺故言安聲咸腎味也倚坐母敗汙臭如腥金為水母而歸水中此為母往從子脾氣反虛五臟由此而相剋賊倚倒致敗宅汙臭而腥故云然也土得其子則成為山金得其母名曰丘矣上四時經黃帝曰四時之序逆順之變異也然脾脈獨何主岐伯曰脾者土也孤臟以灌四旁者也曰然則脾善惡可得見乎曰善者不可得見惡者可見曰惡者何如曰其來如水之流者此謂太過病在外如鳥之喙此謂不及病在中太過則令人四肢沉重不舉其不及則令人九竅壅塞不通名曰重強脾脈來而和柔相離如雞足踐地曰平長夏以胃氣為本脾脈來實而盈數如雞舉足曰脾病脾脈來堅兌如鳥之喙如鳥之距如屋之漏如水之溜曰脾死真脾脈至弱而乍疏乍散一作數色青黃不澤毛折乃死長夏胃微濡弱曰平弱多胃少曰脾病但代無胃曰死濡弱有石曰冬病石甚曰今病脾藏榮榮舍意愁憂不解則傷意意傷則悶亂四肢不舉毛悴色夭死於春六月季夏建未坤未之間土之位脾王之時其脈大阿阿而緩名曰平脈反得弦細而長者是肝之乘脾木之剋土為賊邪大逆十死不治反得浮千金浮作微澀而短者是肺之乘脾子之扶母為實邪雖病自愈反得洪大而散者千金作浮大而洪是心之乘脾母之歸子為虛邪雖病易治反得沉濡而滑者腎之乘脾水之陵土為微邪雖病即瘥脾脈萇萇而弱千金萇萇作長長來疏去數再至曰平三至曰離經病四至脫精五至死六至命盡足太陰脈也脾脈急甚為瘛瘲微急為脾中滿食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病大甚為擊僕微大為痞氣裹大膿血在腸胃之外小甚為寒熱微小為消疸滑甚為頽癃微滑為蟲毒蛔腸鳴熱澀甚為腸頽微澀為內潰多下膿血也足太陰氣絶則脈不營其口唇口唇者肌肉之本也脈不營則肌肉濡肌肉濡則人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也脾死臟浮之脈大緩一作堅按之中如覆杯潔潔狀如搖者死一云漐漐狀如炙肉上素問針經張仲景肺大腸部第四肺象金與大腸合為腑大腸為傳導之腑也其經手太陰手太陰肺脈也與手陽明為表裡手陽明大腸脈也其脈浮浮肺脈之大形也其相季夏六月季夏土王金相其王秋三月廢冬三月囚春三月死夏三月夏火王金死其王日庚辛王時晡時日入其困日甲乙困時平旦日出其死日丙丁死時禺中日中其神魄其主聲其養皮毛其候鼻其聲哭其色白其臭腥其液涕其味辛其宜咸其惡苦肺俞在背第三椎或云第五椎也募在中府直兩乳上下肋間大腸俞在背第十六椎募在天樞挾臍旁各一寸半上新撰肺者西方金萬物之所終金性剛故王西方割斷萬物萬物是以皆終於秋也宿葉落柯萋萋枝條其杌然獨在其脈為微浮毛衛氣遲萋萋者零落之貌也言草木宿葉得秋隨風而落但有枝條杌然獨在此時陽氣則遲脈為虛微如毛也榮氣數數則在上遲則在下故名曰毛諸陽脈數諸陰脈遲榮為陰不應數反言榮氣數陰得秋節而升轉在陽位故一時數而在上也此時陰始用事陽即下藏其氣反遲是以肺脈數散如毛也陽當陷而不陷陰當升而不升為邪所中陰陽交易則不以時定二氣感激故為風寒所中陽中邪則卷陰中邪則緊卷則惡寒緊則為栗寒栗相薄故名曰瘧弱則發熱浮乃來出卷者其人拘卷也緊者脈緊也此謂初中風寒之時脈緊其人則寒寒止而脈更微弱弱則其人發熱熱止則脈浮浮者瘧解王脈出也旦中旦發暮中暮發言瘧發皆隨其初中風邪之時也臟有遠近脈有遲疾周有度數行有漏刻臟謂人五臟肝心脾肺腎也心肺在膈上呼則其氣出是為近呼為陽其脈疾腎肝在膈下吸則其氣入是為遠也吸為陰其脈遲度數謂經脈之長短周身行者榮衛之行也行陰陽各二十五度為一周也以應漏下百刻也遲在上傷毛採數在下傷下焦中焦有惡則見有善則匿秋則陽氣遲陰氣數遲當在下數當在上隨節變故言傷毛採也人之皮毛肺氣所行下焦在臍下陰之所治也其脈應遲今反數故言傷下焦中焦脾也其平善之時脈常自不見衰乃見耳故云有惡則見也陽氣下陷陰氣則溫言陽氣下陷溫養諸臟陽反在下陰反在巔故名曰長而且留陰陽交代各順時節人血脈和平言可長留竟一時上四時經黃帝問曰秋脈如浮何如而浮岐伯對曰秋脈肺也西方金也萬物之所以收成也故其氣來輕虛而浮其氣來急去散故曰浮反此者病黃帝曰何如而反岐伯曰其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中黃帝曰秋脈太過與不及其病何如岐伯曰太過則令人氣逆而背痛溫溫內經溫溫作慍慍然不及則令人喘呼吸少氣而咳上氣見血下聞病音肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本難經云厭厭聶聶如循榆葉曰春平脈藹藹如車蓋按之益大曰秋平脈肺脈來不上不下如循雞羽曰肺病巢源無不字肺脈來如物之浮如風吹毛曰肺死真肺脈至大而虛如以毛羽中人膚色赤白不澤毛折乃死秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病肺藏氣氣舍魄喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏秋金肺王其脈浮千金浮作微澀而短曰平脈反得洪大而散者千金作浮大而洪是心之乘肺火之剋金為賊邪大逆十死不治一本云日月年數至四忌丙丁反得沉濡而滑者是腎之乘肺子之扶母為實邪雖病自愈反得大而緩者是脾之乘肺母之歸子為虛邪雖病易治反得弦細而長者是肝之乘肺木之陵金為微邪雖病即瘥肺脈來泛泛輕如微風吹鳥背上毛再至曰平三至曰離經病四至脫精五至死六至命盡手太陰脈也肺脈急甚為癲疾微急為肺寒熱怠墮咳唾血引腰背胸苦鼻息肉不通緩甚為多肝微緩為痿偏風一作漏風頭以下汗出不可止太甚為脛腫微大為肺痹引胸背起腰內小甚為飧泄微小為消疸滑甚為息賁上氣微滑為上下出血澀甚為嘔血微澀為鼠瘻在頸支掖之間下不勝其上其能喜酸手太陰氣絶則皮毛焦太陰者行氣溫皮毛者也氣弗營則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷者則爪爪字一作皮枯毛折毛折者則氣氣字一作毛先死丙篤丁死火勝金也肺死臟浮之虛按之弱如蔥葉下無根者死上素問針經張仲景腎膀胱部第五腎象木與膀胱合為腑膀胱為津液之腑其經足少陰足少陰腎脈也與足太陽為表裡足太陽膀胱脈也其脈沉沉腎脈之大形也其相秋三月秋金王水相其王冬三月廢春三月囚夏三月其死季夏六月其王日壬癸王時人定夜半其困日丙丁困時禺中日中其死日戊己死時食時日昳其神志腎之所藏者志也其主液其養骨其候耳其聲呻其色黑其臭腐其液唾其味鹹其宜酸其惡甘腎俞在背第十四椎募在京門膀胱俞在第十九椎募在中極橫骨上一寸在臍下五寸前陷者中上新撰腎者北方水萬物之所藏冬則北方用事王在三時之後腎在四臟之下故王北方也萬物春生夏長秋收冬藏百蟲伏蟄冬伏蟄不食之蟲言有百種也陽氣下陷陰氣上升陽氣中出陰氣烈為霜遂不上升化為雪霜猛獸伏蟄蜾蟲匿藏陽氣下陷者謂降於土中也其氣猶越而升出陰氣在上寒盛陽氣雖升出而不能自致因而化作霜雪或謂陽氣中出是十月則霜降猛獸伏蟄者蓋謂龍蛇冬時而潛處螺蟲無毛甲者得寒皆伏蟄逐陽氣所在如此避冰霜自溫養也其脈為沉沉為陰在裡不可發汗發則蜾蟲出見其霜雪陽氣在下故冬脈沉溫養於臟腑此為裡實而表虛復從外發其汗此為逆治非其法也猶百蟲伏蟄之時而反出土見於冰霜必死不疑逆治者死此之謂也陰氣在表陽氣在臟慎不可下下之者傷脾脾土弱即水氣妄行陽氣在下溫養諸臟故不可下也下之既損於陽氣而脾胃復傷土以防水而今反傷之故令水得盈溢而妄行也下之者如魚出水蛾入湯言治病逆則殺人如魚出水蛾入湯火之中立死重客在裡慎不可熏熏之逆客其息則喘重客者猶陽氣也重者尊重之貌也陽位尊處於上今一時在下非其常所故言客也熏謂燒針及以湯火之輩熏發其汗如此則客熱從外入與陽氣相薄是為逆也氣上熏胸中故令喘息無持客熱令口爛瘡無持者無以湯火發熏其汗也熏之則火氣入里為客熱故令其口生瘡陰脈且解血散不通正陽遂厥陰不往從血行脈中氣行脈外五十周而復會如環之無端也血為陰氣為陽相須而行發其汗使陰陽離別脈為解散血不得通厥者逆也謂陽氣逆而不復相朝使治病失所故陰陽錯逆可不慎也客熱狂入內為結胸陰陽錯亂外熱狂入留結胸中也脾氣遂弱清溲痢通脾主水穀其氣微弱水穀不化下痢不息清者廁也溲從水道出而反清溲者是謂下痢至廁也上四時經黃帝問曰冬脈如營何如而營岐伯對曰冬脈腎也北方水也萬物之所以合藏故其氣來沉以摶甲乙作濡故曰營反此者病黃帝曰何如而反岐伯曰其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中黃帝曰冬脈太過與不及其病皆如何岐伯曰太過則令人解㑊脊脈痛而少氣不欲言不及則令人心懸如病飢眇中清脊中痛少腹滿小便黃赤腎脈來喘喘纍纍如鉤按之而堅曰腎平冬以胃氣為本腎脈來如引葛按之益堅曰腎病腎脈來發如奪索辟辟如彈石曰腎死真腎脈至摶而絶如以指彈石辟辟然色黃黑不澤毛折乃死冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病凡人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也腎藏精精舍志盛怒而不止則傷志傷志則善忘其前言腰脊痛不可以俯仰屈伸毛悴色夭死於季夏冬腎水王其脈沉濡而滑曰平脈反得大而緩者是脾之乘腎土之剋水為賊邪大逆十死不治一本云日月年數至一忌戊己反得弦細而長者是肝之乘腎子之扶母為實邪雖病自愈反得浮千金作微澀而短者是肺之乘腎母之歸子為虛邪雖病易治反得洪大而散者千金作浮大而洪是心之乘腎火之陵水為微邪雖病即瘥腎脈沉細而緊再至曰平三至曰離經病四至脫精五至死六至命盡足少陰脈也腎脈急甚為骨痿癲疾微急為奔豚沉厥足不收不得前後緩甚為折脊微緩為洞下洞下者食不化入咽還出大甚為陰痿微大為石水起臍下以至小腹腫垂垂然上至胃脘死不治小甚為洞泄微小為消疸滑甚為癃㿗微滑為骨痿坐不能起目無所見視見黑花澀甚為大癰微澀為不月水沉痔足少陰氣絶則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著骨也骨肉不相親則肉濡而卻肉濡而卻故齒長而垢難經垢字作枯發無澤發無澤者骨先死戊篤己死土勝水也腎死臟浮之堅按之亂如轉丸益下入尺中者死上素問針經張仲景
