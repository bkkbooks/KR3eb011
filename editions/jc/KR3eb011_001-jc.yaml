body:
  text: 卷一脈形狀指下秘決第一二十四種浮脈舉之有餘按之不足浮於手下芤脈浮大而軟按之中央空兩邊實一曰手下無兩旁有洪脈極大在指下一曰浮而大滑脈往來前卻流利展轉替替然與數相似一曰浮中如有力一曰漉漉如欲脫數脈去來促急一曰一息六七至一曰數者進之名促脈來去數時一止復來弦脈舉之無有按之如弓弦狀一曰如張弓弦按之不移又曰浮緊為弦緊脈數如切繩狀一曰如轉索之無常沉脈舉之不足按之有餘一曰重按之乃得伏脈極重指按之著骨乃得一曰手下裁動一曰按之不足舉之無有一曰關上沉不出名曰伏革脈有似沉伏實大而長微弦千金翼以革為牢實脈大而長微強按之隱指愊愊然一曰沉浮皆得微脈極細而軟或欲絕若有若無一曰小也一曰手下快一曰浮而薄一曰按之如欲盡澀脈細而遲往來難且散或一止復來一曰浮而短一曰短而止或曰散也細脈小大於微常有但細耳軟脈極軟而浮細一曰按之無有舉之有餘一曰細小而軟軟一作濡曰濡者如帛衣在水中輕手相得弱脈極軟而沉細按之欲絕指下一曰按之乃得舉之無有虛脈遲大而軟按之不足隱指豁豁然空散脈大而散散者氣實血虛有表無里緩脈去來亦遲小快於遲一曰浮大而軟陰浮與陽同等遲脈呼吸三至去來極遲一曰舉之不足按之盡牢一曰按之盡牢舉之無有結脈往來緩時一止復來按之來緩時一止者名結陽初來動止更來小數不能自還舉之則動名結陰代脈來數中止不能自還因而復動脈結者生代者死動脈見於關上無頭尾大如豆厥厥然動搖傷寒論云陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動浮與芤相類與洪相類弦與緊相類滑與數相類革與實相類千金翼云牢與實相類沉與伏相類微與澀相類軟與弱相類緩與遲相類軟與遲相類平脈早晏法第二黃帝問曰夫診脈常以平旦何也岐伯對曰平旦者陰氣未動陽氣未散飲食未進經脈未盛絡脈調均內經作調勻氣血未亂故乃可診過此非也千金同素問太素云有過之脈切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分分別三關境界脈候所主第三從魚際至高骨其骨自高卻行一寸其中名曰寸口從寸至尺名曰尺澤故曰尺寸寸後尺前名曰關陽出陰入以關為界陽出三分陰入三分故曰三陰三陽陽生於尺動於寸陰生於寸動於尺寸主射上焦出頭及皮毛竟手關主射中焦腹及腰尺主射下焦少腹至足辨尺寸陰陽榮衛度數第四夫十二經皆有動脈獨取寸口以決五臟六腑死生吉凶之候者何謂也然寸口者脈之大會手太陰之動脈也人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸人一日一夜凡一萬三千五百息脈行五十度周於身漏水下百刻榮衛行陽二十五度行陰亦二十五度為一周晬時也故五十度而復會於手太陰太陰者寸口也即五臟六腑之所終始故法取於寸口脈有尺寸何謂也然尺寸者脈之大會要也從關至尺是尺內陰之所治也從關至魚際是寸口內陽之所治也故分寸為尺分尺為寸故陰得尺內一寸陽得寸內九分尺寸終始一寸九分故曰尺寸也脈有太過有不及有陰陽相乘有覆有溢有關有格何謂也然關之前者陽之動也脈當見九分而浮過者法曰太過減者法曰不及遂上魚為溢為外關內格此陰乘之脈也關之後者陰之動也脈當見一寸而沉過者法曰太過減者法曰不及遂入尺為覆為內關外格此陽乘之脈故曰覆溢是真臟之脈也人不病自死平脈視人大小長短男女逆順法第五凡診脈當視其人大小長短及性氣緩急脈之遲速大小長短皆如其人形性者則吉反之者則為逆也脈三部大都欲等只如小人細人婦人脈小軟小兒四五歲脈呼吸八至細數者吉千金翼云人大而脈細人細而脈大人樂而脈實人苦而脈虛性急而脈緩性緩而脈躁人壯而脈細人羸而脈大此皆為逆逆則難治反此為順順則易治凡婦人脈常欲濡弱於丈夫小兒四五歲者脈自快疾呼吸八至也男左大為順女右大為順肥人脈沉瘦人脈浮持脈輕重法第六脈有輕重何謂也然初持脈如三菽之重與皮毛相得者肺部也菽者小豆言脈輕如三小豆之重焒𪄀作皮毛之間者肺氣所行故言肺部也如六菽之重與血脈相得者心部也心主血脈次於肺如六豆之重如九菽之重與肌肉相得者脾部也脾在中央主肌肉故次心如九豆之重如十二菽之重與筋平者肝部也肝主筋又在脾下故次之按之至骨舉之來疾者腎部也腎主骨其脈沉至骨故曰輕重也兩手六脈所主五臟六腑陰陽逆順第七脈法贊云肝心出左脾肺出右腎與命門俱出尺部魂魄穀神皆見寸口左主司官右主司府左大順男右大順女關前一分人命之主左為人迎右為氣口神門訣斷兩在關後人無二脈病死不愈諸經損減各隨其部察按陰陽誰與先後千金云三陰三陽誰先誰後陰病治官陽病治府奇邪所舍如何捕取審而知者針入病愈心部在左手關前寸口是也即手少陰經也與手太陽為表裡以小腸合為府合於上焦名曰神庭在龜一作鳩尾下五分肝部在左手關上是也足厥陰經也與足少陽為表裡以膽合為府合於中焦名曰胞門一作少陽在大倉左右三寸腎部在左手關後尺中是也足少陰經也與足太陽為表裡以膀胱合為府合於下焦在關元左肺部在右手關前寸口是也手太陰經也與手陽明為表裡以大腸合為府合於上焦名呼吸之府在雲門脾部在右手關上是也足太陰經也與足陽明為表裡以胃合為府合於中焦脾胃之間名曰章門在季脅前一寸半腎部在右手關後尺中是也足少陰經也與足太陽為表裡以膀胱合為府合於下焦在關元右左屬腎右為子戶名曰三焦辨臟腑病脈陰陽大法第八脈何以知臟腑之病也然數者腑也遲者臟也數即有熱遲即生寒諸陽為熱諸陰為寒故別知臟腑之病也腑者陽故其脈數臟者陰故其脈遲陽行遲病則數陰行疾病則遲脈來浮大者此為肺脈也脈來沉滑如石腎脈也脈來如弓弦者肝脈也脈來疾去遲心脈也脈來當見而不見為病病有深淺但當知如何受邪辨脈陰陽大法第九脈有陰陽之法何謂也然呼出心與肺吸入腎與肝呼吸之間脾受穀味也其脈在中浮者陽也沉者陰也故曰陰陽心肺俱浮何以別之然浮而大散者心也浮而短澀者肺也腎肝俱沉何以別之然牢而長者肝也按之軟舉指來實者腎也脾者中州故其脈在中千金翼云遲緩而長者脾也是陰陽之脈也脈有陽盛陰虛陰盛陽虛何謂也然浮之損小沉之實大故曰陰盛陽虛沉之損小浮之實大故曰陽盛陰虛是陰陽虛實之意也陽脈見寸口浮而實大今輕手浮之更損減而小故言陽虛重手按之反更實大而沉故言陰實經言脈有一陰一陽一陰二陽一陰三陽有一陽一陰一陽二陰一陽三陰如此言之寸口有六脈俱動耶然經言如此者非有六脈俱動也謂浮沉長短滑澀也浮者陽也滑者陽也長者陽也沉者陰也澀者陰也短者陰也所以言一陰一陽者謂脈來沉而滑也一陰二陽者謂脈來沉滑而長也一陰三陽者謂脈來浮滑而長時一沉也所以言一陽一陰者謂脈來浮而澀也一陽二陰者謂脈來長而沉澀也一陽三陰者謂脈來沉澀而短時一浮也各以其經所在名病之逆順也凡脈大為陽浮為陽數為陽動為陽長為陽滑為陽沉為陰澀為陰弱為陰弦為陰短為陰微為陰是為三陰三陽也陽病見陰脈者反也主死陰病見陽脈者順也主生關前為陽關後為陰陽數則吐血陰微則下利陽弦則頭痛陰弦則腹痛陽微則發汗陰微則自下陽數口生瘡陰數加微必惡寒而煩撓不得眠也陰附陽則狂陽附陰則癲得陽屬腑得陰屬臟無陽則厥無陰則嘔陽微則不能呼陰微則不能吸呼吸不足胸中短氣依此陰陽以察病也寸口脈浮大而疾者名曰陽中之陽病苦煩滿身熱頭痛腹中熱寸口脈沉細者名曰陽中之陰病苦悲傷不樂惡聞人聲少氣時汗出陰氣不通臂不能舉尺脈沉細者名曰陰中之陰病苦兩脛痠疼不能久立陰氣衰小便餘瀝陰下濕癢尺脈滑而浮大者名曰陰中之陽病苦小腹痛滿不能溺溺即陰中痛大便亦然尺脈牢而長關上無有此為陰乾陽其人苦兩脛重少腹引腰痛寸口脈壯大尺中無有此為陽干陰其人苦腰背痛陰中傷足脛寒夫風傷陽寒傷陰陽病順陰陰病逆陽陽病易治陰病難治在腸胃之間以藥和之若在經脈之間針灸病已平虛實第十人有三虛三實何謂也然有脈之虛實有病之虛實有診之虛實脈之虛實者脈來軟者為虛牢者為實病之虛實者出者為虛入者為實言者為虛不言者為實緩者為虛急者為實診之虛實者癢者為虛痛者為實外痛內快為外實內虛內痛外快為內實外虛故曰虛實也問曰何謂虛實答曰邪氣盛則實精氣奪則虛何謂重實所謂重實者言大熱病氣熱脈滿是謂重實問曰經絡俱實如何何以治之答曰經絡皆實是寸脈急而尺緩也當俱治之故曰滑則順澀則逆夫虛實者皆從其物類始五臟骨肉滑利可以長久從橫逆順伏匿脈第十一問曰脈有相乘有從仲景從字作縱字有橫有逆有順何謂也師曰水行乘火金行乘木名曰從火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順經言脈有伏匿者伏匿於何臟而言伏匿也然謂陰陽更相乘更相伏也脈居陰部反見陽脈者為陽乘陰也脈雖時沉澀而短此陽中伏陰脈居陽部反見陰脈者為陰乘陽也脈雖時浮滑而長此為陰中伏陽也重陰者癲重陽者狂脫陽者見鬼脫陰者目盲辨災怪恐怖雜脈第十二問曰脈有殘賊何謂師曰脈有弦有緊有澀有滑有浮有沉此六脈為殘賊能與諸經作病問曰嘗為人所難緊脈何所從而來師曰假令亡汗若吐肺中寒故令緊假令咳者坐飲冷水故令緊假令下利者以胃中虛冷故令緊也問曰翕奄沉名曰滑何謂師曰沉為純陰翕為正陽陰陽和合故脈滑也問曰脈有災怪何謂師曰假令人病脈得太陽脈與病形證相應因為作湯比還送湯之時病者因反大吐若下痢仲景痢字作利病腹中痛因問言我前來脈時不見此證今反變異故是名為災怪因問何緣作此吐痢答曰或有先服藥今發作故為災怪也問曰人病恐怖其脈何類師曰脈形如循絲累累然其面白脫色問曰人愧者其脈何等類師曰其脈自浮而弱面形乍白乍赤問曰人不飲其脈何類師曰其脈自澀而唇口乾燥也言遲者風也搖頭言者其里痛也行遲者其表強也坐而伏者短氣也坐而下一膝者必腰痛裡實護腹如懷卵者必心痛師持脈病人欠者無病也脈之因伸者無病也一云呻者病也假令向壁臥聞師到不驚起而目眄視一云反面仰視若三言三止脈之嚥唾此為詐病假令脈自和處言此病大重當須服吐下藥針灸數十百處乃愈遲疾短長雜脈法第十三黃帝問曰余聞胃氣手少陽三焦四時五行脈法夫人言脈有三陰三陽知病存亡脈外以知內尺寸大小願聞之岐伯曰寸口之中外別浮沉前後左右虛實死生之要皆見寸口之中脈從前來者為實邪從後來者為虛邪從所不勝來者為賊邪從所勝來者為微邪自病一作得者為正邪外結者病癰腫內結者病疝瘕也間來而急者病正在心癥氣也脈來疾者為風也脈來滑者為病食也脈來滑躁者病有熱也脈來澀者為病寒濕也脈逆順之道不與眾謀師曰夫呼者脈之頭也初持之來疾去遲此為出疾入遲為內虛外實初持脈來遲去疾此為出遲入疾為內實外虛也脈數則在腑遲則在臟脈長而弦病在肝扁鵲云病出於肝脈小血少病在心扁鵲云脈大而洪病出於心脈下堅上虛病在脾胃扁鵲云病出於脾胃脈滑一作澀而微浮病在肺扁鵲云病出於肺脈大而堅病在腎扁鵲云小而緊脈滑者多血少氣脈澀者少血多氣脈大者血氣俱多又云脈來大而堅者血氣俱實脈小者血氣俱少又云脈來細而微者血氣俱虛沉細滑疾者熱遲緊為寒又云洪數滑疾為熱澀遲沉細為寒脈盛滑緊者病在外熱脈小實而緊者病在內冷脈小弱而澀謂之久病脈滑浮而疾者謂之新病脈浮滑其人外熱風走刺有飲難治脈沉而緊上焦有熱下寒得冷即便下脈沉而細下焦有寒小便數時苦絞痛下利重脈浮緊且滑直者外熱內冷不得大小便脈洪大緊急病速進在外苦頭髮熱癰腫脈細小緊急病速進在中寒為疝瘕積聚腹中刺痛脈沉重而直前絕者病血在腸間脈沉重而中散者因寒食成癥脈直前而中散絕者病消渴一云病浸淫痛脈沉重前不至寸口徘徊絕者病在肌肉遁屍脈左轉而沉重者氣癥陽在胸中脈右轉出不至寸口者內有肉癥脈累累如貫珠不前至有風寒在大腸伏留不去脈累累中止不至寸口軟者結熱在小腸膜中伏留不去脈直前左右彈者病在血脈中肧血也脈後而左右彈者病在筋骨中也脈前大後小即頭痛目眩脈前小後大即胸滿短氣上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無所苦夫脈者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少太素細作滑澀則心痛渾渾革革至如湧泉病進而危弊弊綽綽其去如弦絕者死短而急者病在上長而緩者病在下沉而弦急者病在內浮而洪大者病在外脈實者病在內脈虛者病在外在上為表在下為里浮為在表沉為在裡平人得病所起第十四何以知春得病無肝脈也無心脈夏得病無肺脈秋得病無腎脈冬得病無脾脈四季之月得病假令肝病者西行若食雞肉得之當以秋時發得病以庚辛日也家有腥死女子見之以明要為災不者若感金銀物得之假令脾病東行若食雉兔肉及諸木果實得之不者當以春時發得病以甲乙日也假令心病北行若食豚魚得之不者當以冬時發得病以壬癸日也假令肺病南行若食馬肉及獐鹿肉得之不者當以夏時發得病以丙丁日也假令腎病中央若食牛肉及諸土中物得之不者當以長夏時發得病以戊己日也假令得王脈當於縣官家得之假令得相脈當於嫁娶家得之或相慶賀家得之假令得胎脈當於產乳家得之假令得囚脈當於囚徒家得之假令得休脈其人素有宿病不治自愈假令得死脈當於死喪家感傷得之何以知人露臥得病陽中有陰也何以知人夏月得病諸陽入陰也何以知人食飲中毒浮之無陽微細之不可知也但有陰脈來疾去疾此相為水氣之毒也脈遲者食乾物得之診病將瘥難已脈第十五問曰假令病人慾瘥脈而知愈何以別之師曰寸關尺大小遲疾浮沉同等雖有寒熱不解者此脈陰陽為平復當自愈人病其寸口之脈與人迎之脈小大及浮沉等者病難已
