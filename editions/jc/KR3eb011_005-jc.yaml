body:
  text: 卷五張仲景論脈第一脈有三部陰陽相乘榮衛氣血在人體躬千金作而行人躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀脈大小不同一時之間變無經常尺寸參差或短或長上下乖錯或存或亡病輒改易進退低昂心迷意惑動失紀綱願為縷陳令得分明師曰子之所問道之根源脈有三部尺寸及關榮衛流行不失衡銓腎沉心洪肺浮肝弦此自經常不失銖分出入升降漏刻周旋水下二刻臣億等詳水下二刻疑檢舊本如此脈一周身旋覆寸口虛實見焉變化相乘陰陽相干風則浮虛寒則緊弦沉潛水滀支飲急弦動弦為痛數洪熱煩設有不應知變所緣三部不同病各異端太過可怪不及亦然邪不空見終必有奸審察表裡三焦別分知邪所舍消息診看料度腑臟獨見若神為子條記傳與賢人扁鵲陰陽脈法第二脈平旦曰太陽日中曰陽明晡時曰少陽黃昏曰少陰夜半曰太陰雞鳴曰厥陰是三陰三陽時也少陽之脈乍小乍大乍長乍短動搖六分王十一月甲子夜半正月二月甲子王太陽之脈洪大以長其來浮於筋上動搖九分三月四月甲子王陽明之脈浮大以短動搖三分大前小後狀如科斗其至跳五月六月甲子王少陰之脈緊細動搖六分王五月甲子日中七月八月甲子王太陰之脈緊細以長乘於筋上動搖九分九月十月甲子王厥陰之脈沉短以緊動搖三分十一月十二月甲子王厥陰之脈急弦動搖至六分以上病遲脈寒少腹痛引腰形喘者死脈緩者可治刺足厥陰入五分少陽之脈乍短乍長乍大乍小動搖至六分以上病頭痛脅下滿嘔可治擾即死一作傴可治偃即死刺兩季肋端足少陽也入七分陽明之脈洪大以浮其來滑而跳大前細後狀如科斗動搖至三分以上病眩頭痛腹滿痛嘔可治擾即死刺臍上四寸臍下三寸各六分從二月至八月陽脈在表從八月至正月陽脈在裡附陽脈強附陰脈弱至即驚實則痸瘲細而沉不痸瘲即泄泄即煩煩即渴渴即腹滿滿即擾擾即腸澼澼即脈代乍至乍不至大而沉即咳咳即上氣上氣甚則肩息肩息甚則口舌血出血出甚即鼻血出變出寸口陰陽表裡以互相乘如風有道陰脈乘陽也寸口中前後溢者行風寸口中外實內不滿者三風四溫寸口者勞風勞風者大病亦發快行汗出亦發軟風者上下微微扶骨是其診也表緩腹內急者軟風也猥雷實夾者飄風從陰趨陽者風邪一來調一來速鬼邪也陰緩陽急者表有風來入臟也陰急者風已抱陽入腹上逯逯下宛宛不能至陽流飲也上下血微陰強者為漏癖陽強者酒癖也傴偷不過微反陽澹漿也陰扶骨絕者從寸口前頓趣於陰汗水也來調四布者欲病水也陰脈不偷陽脈傷復少津寸口中後大前兌至陽而實者癖食小過陽一分者七日癖二分者十日癖三分者十五日癖四分者二十日癖四分中伏不過者半歲癖敦敦不至胃陰一分飲餔餌癖也外勾者久癖也內卷者十日以還外強內弱者裹大核也並浮而弦者汁核並浮緊而數如沉病暑食粥一作微有內緊而伏麥飯若餅寸口脈倚陽緊細以微瓜菜皮也若倚如緊薺藏菜也賾賾無數生肉癖也附陽者炙肉癖也小倚生浮大如故生麥豆也扁鵲脈法第三扁鵲曰人一息脈二至謂平脈體形無苦人一息脈三至謂病脈一息四至謂痹者脫脈氣其眼睛青者死人一息脈五至以上死不可治也都一作聲息病脈來動取極五至病有六七至也扁鵲曰平和之氣不緩不急不滑不澀不存不亡不短不長不俯不仰不從不橫此謂平脈腎一作緊受如此一作剛身無苦也扁鵲曰脈氣弦急病在肝少食多厭裡急多言頭眩目痛腹滿筋攣癲疾上氣少腹積堅時時唾血咽喉中干相病之法視色聽聲觀病之所在候脈要訣豈不微乎脈浮如數無熱者風也若浮如數而有熱者氣也脈洪大者又兩乳房動脈複數加有寒熱此傷寒病也若羸長病如脈浮溢寸口復有微熱此疰氣病也如復咳又多熱乍劇乍瘥難治也又療無劇者易瘥不咳者易治也扁鵲華佗察聲色要訣第四病人五臟已奪神明不守聲嘶者死病人循衣縫譫言者不可治病人陰陽俱絕掣衣掇空妄言者死病人妄語錯亂及不能語者不治熱病者可治病人陰陽俱絕失音不能言者三日半死病人兩目眥有黃色起者其病方愈病人面黃目青者不死青如草滋死病人面黃目赤者不死赤如衃血死病人面黃目白者不死白如枯骨死病人面黃目黑者不死黑如炲死病人面目俱等者不死病人面黑目青者不死病人面青目白者死病人面黑目白者不死病人面赤目青者六日死病人面黃目青者九日必死是謂亂經飲酒當風邪入胃經膽氣妄泄目則為青雖有天救不可復生病人面赤目白者十日死憂恚思慮心氣內索面色反好急求棺槨病人面白目黑者死此謂榮華已去血脈空索病人面黑目白者八日死腎氣內傷病因留積病人面青目黃者五日死病人著床心痛短氣脾竭內傷百日復愈能起傍徨因坐於地其亡倚床能治此者可謂神良病人面無精光若土色不受飲食者四日死病人目無精光及牙齒黑色者不治病人耳目鼻口有黑色起入於口者必死病人耳目及顴頰赤者死在五日中病人黑色出於額上髮際下直鼻脊兩顴上者亦死在五日中病人黑氣出天中下至年上顴上者死病人及健人黑色若白色起入目及鼻口死在三日中病人及健人面忽如馬肝色望之如青近之如黑者死病人面黑目直視惡風者死病人面黑唇青者死病人面青唇黑者死病人面黑兩脅下滿不能自轉反者死病人目回回直視肩息者一日死病人頭目久痛卒視無所見者死病人陰結陽絕目精脫恍惚者死病人陰陽絕竭目眶陷者死病人眉系傾者七日死病人口如魚口不能復閉而氣出多不反者死病人口張者三日死病人唇青人中反三日死病人唇反人中滿者死病人唇口忽乾者不治病人唇腫齒焦者死病人陰陽俱竭其齒如熟小豆其脈快者死病人齒忽變黑者十三日死病人舌卷卵縮者必死病人汗出不流舌卷黑者死病人髮直者十五日死病人發如干麻善怒者死病人發與眉衝起者死病人爪甲青者死病人爪甲白者不活病人手足爪甲下肉黑者八日死病人榮衛竭絕面浮腫者死病人卒腫其面蒼黑者死病人手掌腫無紋者死病人臍腫反出者死病人陰囊莖俱腫者死病人脈絕口張足腫五日死病人足趺腫嘔吐頭重者死病人足趺上腫兩膝大如斗者十日死病人臥遺屎不覺者死病人屍臭者不可治肝病皮黑肺之日庚辛死心病目黑腎之日壬癸死脾病唇青肝之日甲乙死肺病頰赤目腫心之日丙丁死腎病面腫唇黃脾之日戊己死青欲如蒼璧之澤不欲如藍赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽黑欲重漆不欲如炭黃欲如羅裹雄黃不欲如黃土目色赤者病在心白在肺黑在腎黃在脾青在肝黃色不可名者病胸中診目病赤脈從上下者太陽病也從下上者陽明病也從外入內者少陽病也診寒熱瘰癧目中有赤脈從上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死診齲齒痛按其陽明之脈來有過者獨熱在右右熱在左左熱在上上熱在下下熱診血者脈多赤多熱多青多痛多黑為久痹多赤多黑多青皆見者寒熱身痛面色微黃齒垢黃爪甲上黃黃疸也安臥少黃赤脈小而澀者不嗜食扁鵲診諸反逆死脈要訣第五扁鵲曰夫相死脈之氣如群鳥之聚一馬之馭系水交馳之狀如懸石之落出筋之上藏筋之下堅關之裡不在榮衛伺候交射不可知也脈病人不病脈來如屋漏雀啄者死屋漏者其來既絕而止時時復起而不相連屬也雀啄者脈來甚數而疾絕止復頓來也又經言得病七八日脈如屋漏雀啄者死脈彈人手如黍米也脈來如彈石去如解索者死彈石者辟辟急也解索者動數而隨散亂無復次緒也脈困病人脈如蝦之遊如魚之翔者死蝦游者苒苒而起尋復退沒不知所在久乃復起起輒遲而沒去速者是也魚翔者似魚不行而但掉尾動頭身搖而久住者是也脈如懸薄卷索者死脈如轉豆者死脈如偃刀者死脈湧湧不去者死脈忽去忽來暫止復來者死脈中侈者死脈分絕者死上下分散也脈有表無里者死經名曰結去即死何謂結脈在指下如麻子動搖屬腎名曰結去死近也脈五來一止不復增減者死經名曰代何謂代脈五來一止也脈七來是人一息半時不復增減亦名曰代正死不疑經言病或有死或有不治自愈或有連年月而不已其死生存亡可切脈而知之耶然可具知也設病者若閉目不欲見人者脈當得肝脈弦急而長反得肺脈浮短而澀者死也病若開目而渴心下牢者脈當得緊實而數反得沉滑而微者死病若吐血復鼽衄者脈當得沉細而反浮大牢者死病若譫言妄語身當有熱脈當洪大而反手足四逆脈反沉細微者死病若大腹而泄脈當微細而澀反得緊大而滑者死此之謂也經言形脈與病相反者死奈何然病若頭痛目痛脈反短澀者死病若腹痛脈反浮大而長者死病若腹滿而喘脈反滑利而沉者死病若四肢厥逆脈反浮大而短者死病若耳聾脈反浮大而澀者死千金翼云脈大者生沉遲細者難治病若目䀮䀮脈反大而緩者死左有病而右痛右有病而左痛下有病而上痛上有病而下痛此為逆逆者死不可治脈來沉之絕濡浮之不止推手者半月死一作半日脈來微細而絕者人病當死人病脈不病者生脈病人不病者死人病屍厥呼之不應脈絕者死脈當大反小者死肥人脈細小如絲欲絕者死羸人得躁脈者死人身澀而脈來往滑者死人身滑而脈來往澀者死人身小而脈來往大者死人身短而脈來往長者死人身長而脈來往短者死人身大而脈來往小者死尺脈不應寸時如馳半日死千金云尺脈上應寸口太遲者半日死肝脾俱至則穀不化肝多即死肺肝俱至則癰疽四肢重肺多即死心肺俱至則痹消渴懈怠心多即死腎心俱至則難以言九竅不通四肢不舉腎多即死脾腎俱至則五臟敗壞脾多即死肝心俱至則熱甚痸瘲汗不出妄見邪肝腎俱至則疝瘕少腹痛婦人月使不來肝滿腎滿肺滿皆實則為腫肺之雍喘而兩胠滿肝雍兩胠滿臥則驚不得小便腎雍腳下至少腹滿𦯓有大小髀胻大跛易偏枯心脈滿大癇痸筋攣肝脈小急癇痸筋攣肝脈騖暴有所驚駭脈不至若喑不治自已腎脈小急肝脈小急心脈小急不鼓皆為瘕腎肝並沉為石水並浮為風水並虛為死並小弦欲驚腎脈大急沉肝脈大急沉皆為疝心脈搏滑急為心疝肺脈沉搏為肺疝脾脈外鼓沉為腸澼久自已肝脈小緩為腸澼易治腎脈小搏沉為腸澼下血溫身熱者死心肝澼亦下血二臟同病者可治其脈小沉澀者為腸澼其身熱者死熱見七日死胃脈沉鼓澀胃外鼓大心脈小緊急皆膈偏枯男子發左女子發右不喑舌轉可治三十日起其順者喑三歲起年不滿二十者三歲死脈至而搏血衄身有熱者死脈來如懸鉤浮為熱脈至如喘名曰氣厥氣厥者不知與人言素問甲乙作暴厥脈至如數使人暴驚三四日自已脈至浮合浮合如數一息十至十至以上是為經氣予不足也微見九十日死脈至如火新然是心精之予奪也草乾而死脈至如散葉是肝氣予虛也木葉落而死木葉落作棗華脈至如省客省客者脈塞而鼓是腎氣予不足也懸去棗華而死脈至如泥丸是胃精予不足也榆莢落而死素問莢作葉脈至如橫格是膽氣予不足也禾熟而死脈至如弦縷是胞精予不足也病善言下霜而死不言可治脈至如交漆交漆者左右旁至也微見四十日死甲乙作交棘脈至如湧泉浮鼓肌中是大腸氣予不足也少氣味韭英而死脈至如委土素問作頹土之狀按之不得是肌氣予不足也五色先見黑白壘一作藟發死脈至如懸雍懸雍者浮揣切之益大是十二俞之予不足也水凝而死脈至如偃刀偃刀者浮之小急也按之堅大急五臟菀熟寒熱獨並於腎也如此其人不得坐立春而死脈至如丸滑不直手不直手者按之不可得也是大腸氣予不足也棗葉生而死脈至如舂者令人善恐不欲坐臥行立常聽是小腸氣予不足也季秋而死問曰嘗以春二月中脈一病人其脈反沉師記言到秋當死其病反愈到七月復病因往脈之其脈續沉復記言至冬死問曰二月中得沉脈何以故處之至秋死也師曰二月之時其脈自當濡弱而弦得沉脈到秋自沉脈見浮即死故知到秋當死也七月之時脈復得沉何以處之至冬當死師曰沉脈屬腎真臟脈也非時妄見經言王相囚死冬脈本王脈不再見故知至冬當死也然後至冬復病王以冬至日死故知為諦華佗效此
