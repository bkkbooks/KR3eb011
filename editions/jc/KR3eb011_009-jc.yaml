body:
  text: 卷九平妊娠分別男女將產諸證第一脈平而虛者乳子法也經云陰搏陽別謂之有子此是血氣和調陽施陰化也診其手少陰脈動甚者妊子也少陰心脈也心主血脈又腎名胞門子戶尺中腎脈也尺中之脈按之不絕法妊娠也三部脈沉浮正等按之無絕者有娠也妊娠初時寸微小呼吸五至三月而尺數也脈滑疾重以手按之散者胎已三月也脈重手按之不散但疾不滑者五月也婦人妊娠四月欲知男女法左疾為男右疾為女俱疾為生二子又法得太陰脈為男得太陽脈為女太陰脈沉太陽脈浮又法左手沉實為男右手浮大為女左右手俱沉實猥生二男左右手俱浮大猥生二女又法尺脈左偏大為男右偏大為女左右俱大產二子大者如實狀又法左右尺俱浮為產二男不爾則女作男生左右尺俱沉為產二女不爾則男作女生也又法遣妊娠人面南行還復呼之左回首者是男右回首者是女也又法看上圊時夫從後急呼之左回首是男右回首是女也又法婦人妊娠其夫左乳房有核是男右乳房有核是女也婦人懷娠離經其脈浮設腹痛引腰脊為今欲生也但離經者不病也又法婦人慾生其脈離經夜半覺日中則生也平妊娠胎動血分水分吐下腹痛證第二婦人懷胎一月之時足厥陰脈養二月足少陽脈養三月手心主脈養四月手少陽脈養五月足太陰脈養六月足陽明脈養七月手太陰脈養八月手陽明脈養九月足少陰脈養十月足太陽脈養諸陰陽各養三十日活兒手太陽少陰不養者下主月水上為乳汁活兒養母懷娠者不可灸刺其經必墮胎婦人懷娠三月而渴其脈反遲者欲為水分復腹痛者必墮胎脈浮汗出者必閉其脈數者必發癰膿五月六月脈數者必向壞脈緊者必胞漏脈遲者必腹滿而喘脈浮者必水壞為腫問曰有一婦人年二十所其脈浮數發熱嘔咳時下利不欲食脈復浮經水絕何也師曰法當有娠何以故此虛家法當微弱而反浮數此為戴陽陰陽和合法當有娠到立秋熱當自去何以知然數則為熱熱者是火火是木之子死於未未為六月位土王火休廢陰氣生秋節氣至火氣當罷熱自除去其病即愈師曰乳後三月有所見後三月來脈無所見此便是軀有兒者護之恐病利也何以故懷妊陽氣內養乳中虛冷故令兒利婦人懷娠六月七月脈弦發熱其胎逾腹腹痛惡寒寒者小腹如扇之狀所以然者子臟開故也當以附子湯溫其臟婦人妊娠七月脈實大牢強者生沉細者死婦人妊娠八月脈實大牢強弦緊者生沉細者死婦人懷軀六月七月暴下鬥余水其胎必倚而墮此非時孤漿預下故也師曰寸口脈洪而澀洪則為氣澀則為血氣動丹田其形即溫澀在於下胎冷若冰陽氣胎活陰氣必終欲別陰陽其下必僵假令陽終畜然若杯問曰婦人妊娠病師脈之何以知此婦人雙胎其一獨死其一獨生而為下其死者其病即愈然後竟免軀其脈何類何以別之師曰寸口脈衛氣平調榮氣緩舒陽施陰化精盛有餘陰陽俱盛故成雙軀今少陰微緊血即濁凝經養不周胎則偏夭少腹冷滿膝臏疼痛腰重起難此為血理若不早去害母失胎師曰婦人有胎腹痛其人不安若胎病不長欲知生死令人摸之如覆杯者則男如肘頭參差起者女也冷在何面冷者為死溫者為生師曰婦人有漏下者有中生後因續下血都不絕者有妊娠下血者假令妊娠腹中痛為胞漏一云阻膠艾湯主之婦人妊娠經斷三月而得漏下下血四十日不止胎欲動在於臍上此為妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以下血不止者其癥不去故也當下其癥宜桂枝茯苓丸問曰婦人病經水斷一二月而反經來今脈反微澀何也師曰此前月中若當下利故令妨經利止月經當自下此非軀也婦人經自斷而有軀其脈反弦恐其後必大下不成軀也婦人懷軀七月而不可知時時衄血而轉筋者此為軀也衄時嚏而動者非軀也脈來近去遠故曰反以為有軀而反斷此為有陽無陰故也婦人經月下但為微少師脈之反言有軀其後審然其脈何類何以別之師曰寸口脈陰陽俱平榮衛調和按之滑浮之則輕陽明少陰各如經法身反灑淅不欲食飲頭痛心亂嘔噦欲吐呼則微數吸則不驚陽多氣溢陰滑氣盛滑則多實六經養成所以月見陰見陽精汁凝胞散散者損墮設復陽盛雙妊二胎今陽不足故令激經也婦人妊娠小便難飲如故當歸貝母苦參丸主之婦人妊娠有水氣身重小便不利洒洒惡寒起即頭眩葵子茯苓散主之婦人妊娠宜服當歸散即易產無疾苦師曰有一婦人來診一作脈自道經斷不來師言一月為衃二月為血三月為居經是定作軀也或為血積譬如雞乳子熱者為祿寒者多濁且當須後月復來經當入月幾日來假令以七日所來因言且須後月十日所來相間設其主復來者因脈之脈反沉而澀因問曾經半生若漏下亡血者定為有軀其人言實有是宜當護之今經微弱恐復不安設言當奈何當為合藥治之師曰有一婦人來診自道經斷即去師曰一月血為閉二月若有若無三月為血積譬如雞伏子中寒即濁中熱即祿欲令胎壽當治其母挾寒懷子命則不壽也譬如雞伏子試取雞一毛拔去覆子不遍中寒者濁今夫人有軀少腹寒手掌反逆奈何得有軀婦人因言當奈何師曰當與溫經湯設與夫傢俱來者有軀與父母傢俱來者當言寒多久不作軀師曰有一婦人來診因言陰陽俱和調陽氣長陰氣短但出不入去近來遠故曰反以為有軀偏反血斷斷來幾日假令審實者因言急當治恐經復下設令宮中人若寡婦無夫曾夜夢寐交通邪氣或懷久作癥瘕急當治下服二湯設復不愈因言發湯當中下胎而反不下此何等意邪可使且將視赤烏一作赤馬師曰若宮裡張氏不瘥復來相問臣億等詳此文理脫誤不屬無本可校以示闕疑余皆效此師曰脈婦人得平脈陰脈小弱其人渴不能食無寒熱名為軀桂枝主之法六十日當有娠設有醫治逆者卻一月加吐下者則絕之方在傷寒中婦人脈平而虛者乳子法也平而微者實奄續法也而反微澀其人不亡血下利而反甚其脈虛但坐乳大兒及乳小兒此自其常不能令甚虛竭病與亡血虛等必眩冒而短氣也師曰有一婦人好裝衣來診而得脈澀因問曾乳子下利乃當得此脈耳曾半生漏下者可設不者經斷三月六月設乳子漏下可為奄續斷小兒勿乳須利止復來相問脈之師曰寸口脈微遲尺微於寸寸遲為寒在上焦但當吐耳今尺反虛復為強下之如此發胸滿而痛者必吐血少腹痛腰脊痛者必下血師曰寸口脈微而弱氣血俱虛若下血嘔吐汗出者可不者趺陽脈微而弱春以胃氣為本吐利者可不者此為水氣其腹必滿小便則難婦人常嘔吐而胃反若常喘一作多唾其經又斷設來者必少師曰有一婦人年六十所經水常自下設久得病利少腹堅滿者為難治師曰有一婦人來診言經水少不如前者何也師曰曾更下利若汗出小便利者可何以故師曰亡其津液故令經水少設經下反多於前者當所苦困當言恐大便難身無復汗也師曰寸口脈沉而遲沉則為水遲則為寒寒水相摶趺陽脈伏水穀不化脾氣衰則鶩溏胃氣衰則身體腫少陽脈畀少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分一作水分師曰寸口脈沉而數數則為出沉則為入出則為陽實入則為陰結趺陽脈微而弦微則無胃氣弦則不得息少陰脈沉而滑沉則為在裡滑則為實沉滑相摶血結胞門其藏不瀉經絡不通名曰血分問曰病有血分何謂也師曰經水前斷後病水名曰血分此病為難治問曰病有水分何謂也師曰先病水後經水斷名曰水分此病易治何以故去水其經自當下脈濡而弱弱反在關濡反在巔遲在上緊在下遲則為寒名曰渾陽濁則濕名曰霧緊則陰氣慄脈反濡弱濡則中濕弱則中寒寒濕相搏名曰痹腰脊骨節苦煩肌為不仁此當為痹而反懷軀遲歸經體重以下腳為胕腫按之沒指腰冷不仁此為水懷喘則倚息小便不通緊脈為嘔血氣無餘此為水分榮衛乖亡此為非軀平產後諸病鬱冒中風發熱煩嘔下利證第三問曰新產婦人有三病一者病痓亦作痙二者病鬱冒三者大便難何謂也師曰新產亡血虛多汗出喜中風故令病痓何故鬱冒師曰亡血復汗寒多故令鬱冒何故大便難師曰亡津液胃燥故大便難產婦鬱冒其脈微弱嘔不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故但頭汗出所以生婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復所以便堅者嘔不能食也小柴胡湯主之病解能食七八日而更發熱者此為胃熱氣實承氣湯主之方在傷寒中婦人產得風續之數十日不解頭微痛惡寒時時有熱心下堅乾嘔汗出雖久陽旦證續在可與陽旦方在傷寒中桂枝是也婦人產後中風發熱面正赤喘而頭痛竹葉湯主之婦人產後腹中㽲痛可與當歸羊肉湯師曰產婦腹痛煩滿不得臥法當枳實芍藥散主之假令不愈者此為腹中有乾血著臍下與下瘀血湯婦人產後七八日無太陽證少腹堅痛此惡露不盡不大便四五日趺陽脈微實再倍其人發熱日晡所煩躁者不能食譫語利之則愈宜承氣湯以熱在裡結在膀胱也方在傷寒中婦人產中虛煩亂嘔逆安中益氣竹皮大丸主之婦人熱利重下新產虛極白頭翁加甘草湯主之千金方又加阿膠平帶下絕產無子亡血居經證第四師曰婦人帶下六極之病脈浮則為腸鳴腹滿緊則為腹中痛數則為陰中癢痛則生瘡弦則陰疼掣痛師曰帶下有三門一曰胞門二曰龍門三曰玉門已產屬胞門未產屬龍門未嫁女屬玉門問曰未出門女有三病何謂也師曰一病者經水初下陰中熱或有當風或有扇者二病者或有以寒水洗之三病者或見丹下驚怖得病屬帶下師曰婦人帶下九實中事假令得鼠乳之病劇易當劇有期當庚辛為期余皆仿此問曰有一婦人年五十所病但苦背痛時時腹中痛少食多厭喜䐜脹其脈陽微關尺小緊形脈不相應願知所說師曰當問病者飲食何如假令病者言我不欲飲食聞穀氣臭者病為在上焦假令病者言我少多為欲食不食亦可病為在中焦假令病者言我自飲食如故病為在下焦為病屬帶下當以帶下治之婦人帶下經水不利少腹滿痛經一月再見土瓜根散主之婦人帶下脈浮惡寒漏下者不治師曰有一婦人將一女子年十五所來診言女年十四時經水自下今經反斷其母言恐怖師曰言此女為是夫人親女非耶若親者當相為說之婦人因答言自是女爾師曰所以問者無他夫人年十四時亦以經水下所以斷此為避年勿怪後當自下婦人少腹冷惡寒久年少者得之此為無子年大者得之絕產師曰脈微弱而澀年少得此為無子中年得此為絕產師曰少陰脈浮而緊緊則疝瘕腹中痛半產而墮傷浮則亡血絕產惡寒師曰肥人脈細胞有寒故令少子其色黃者胸上有寒婦人少腹䍽音袞磊力罪切轉痛而復自解發作無常經反斷膀胱中結堅急痛下引陰中氣衝者久必兩脅拘急問曰婦人年五十所病下利數十日不止暮則發熱少腹裡急痛腹滿手掌熱唇口乾燥何也師曰此病屬帶下何以故曾經半產瘀血在少腹中不去何以知之其證唇口乾燥故知之當與溫經湯問曰婦人病下利而經水反斷者何也師曰但當止利經自當下勿怪所以利不止而血斷者但下利亡津液故經斷利止津液復經當自下婦人血下咽乾而不渴其經必斷此榮不足本自有微寒故不引飲渴而引飲者津液得通榮衛自和其經必復下師曰寸口脈微而澀微則衛氣不足澀則血氣無餘衛不足其息短其形燥血不足其形逆榮衛俱虛言語謬誤趺陽脈浮而澀澀則胃氣虛虛則短氣咽燥而口苦胃氣澀則失液少陰脈微而遲微則無精遲則陰中寒澀則血不來此為居經三月一來師曰脈微血氣俱虛年少者亡血也乳子下利為可不者此為居經三月一來問曰婦人妊娠三月師脈之言此婦人非軀今月經當下其脈何類何以別之師曰寸口脈衛浮而大榮反而弱浮大則氣強反弱則少血孤陽獨呼陰不能吸二氣不停衛降榮竭陰為積寒陽為聚熱陽盛不潤經絡不足陰虛陽往一作實故令少血時發灑淅咽燥汗出或溲稠數多唾涎沫此令重虛津液漏泄故知非軀畜煩滿洫月稟一經三月一來陰盛則瀉名曰居經問曰婦人年五十所一朝而清血二三日不止何以治之師曰此婦人前絕生經水不下今反清血此為居經不須治當自止經水下常五日止者五日愈婦人月經一月再來者經來其脈欲自如常而反微不利不汗出者其經二月必來平鬱冒五崩漏下經閉不利腹中諸病證第五問曰婦人病經水適下而發其汗則鬱冒不知人何也師曰經水下故為裡虛而發其汗為表復虛此為表裡俱虛故令鬱冒也問曰婦人病如癲疾鬱冒一日二十餘發師脈之反言帶下皆如師言其脈何類何以別之師曰寸口脈濡而緊濡則陽氣微緊則榮中寒陽微衛氣虛血竭凝寒陰陽不和邪氣舍於榮衛疾疾一作候起年少時經水來以合房室移時過度精感命門開經下血虛百脈皆張中極感陽動微風激成寒因虛舍榮衛冷積于丹田發動上衝奔在胸膈津液掩口入涎唾湧溢出眩冒狀如厥氣衝髀裡熱粗醫名為癲灸之因大劇問曰婦人病苦氣上衝胸眩冒吐涎沫髀裡氣沖熱師脈之不名帶下其脈何類何以別之師曰寸口脈沉而微沉則衛氣伏微則榮氣絕陽伏則為疹陰絕則亡血病當小便不利津液閉塞今反小便通微汗出沉變為寒咳逆嘔沫其肺成痿津液竭少亡血損經絡因寒為血厥手足苦痹氣從丹田起上至胸脅沉寒怫鬱於上胸中窒塞氣歷陽部面翕如醉形體似肥此乃浮虛醫反下之長針復重虛榮衛久發眩冒故知為血厥也問曰五崩何等類師曰白崩者形如涕赤崩者形如絳津黃崩者形如爛瓜青崩者形如藍色黑崩者形如衃血也師曰有一婦人來脈反得微澀法當吐若下利而言不因言夫人年幾何夫人年七七四十九經水當斷反至今不止以故致此虛也寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相摶脈則為革婦人則半產漏下旋覆花湯主之婦人陷經漏下黑不解膠薑湯主之婦人經水不利抵當湯主之在傷寒中婦人經水閉不利臟堅僻不止中有乾血下白物礬石丸主之婦人腹中諸疾痛當歸芍藥散主之一云治懷妊腹中疼痛婦人腹中痛小建中湯主之方在傷寒中一云腹中痛小便利理中湯主之平咽中如有炙腐喜悲熱入血室腹滿證第六婦人咽中如有炙腐狀半夏厚朴湯主之婦人臟燥喜悲傷欲哭象如神靈所作數欠甘草小麥湯主之婦人中風發熱惡寒經水適來得之七八日熱除脈遲身涼胸脅下滿如結胸狀其人譫語此為熱入血室當刺期門隨其虛實而取之婦人中風七八日續有寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之方在傷寒中婦人傷寒發熱經水適來晝日了了暮則譫語如見鬼狀此為熱入血室無犯胃氣若上二焦必當自愈二字疑陽明病下血而譫語此為熱入血室但頭汗出者當刺期門隨其實而寫之濈然汗出者則愈婦人少腹滿如敦敦狀要略云滿而熱小便微難而不渴生後生後疑者此為水與血並結在血室大黃甘遂湯主之平陰中寒轉胞陰吹陰生瘡脫下證第七婦人陰寒溫中坐藥蛇床子散主之婦人著坐藥強下其經目眶為痛足跟難以踐地心中狀如懸問曰有一婦人病飲食如故煩熱不得臥而反倚息者何也師曰得病轉胞不得溺也何以故師曰此人故肌盛頭舉身滿今反羸瘦頭舉中空感一作減胞系了戾故致此病但利小便則愈宜服腎氣丸以中有茯苓故也方在虛勞中師曰脈得浮緊法當身軀疼痛設不痛者當射云何因當射言若腸中痛腹中鳴咳者因失便婦人得此脈者法當陰吹師曰寸口脈浮而弱浮則為虛弱則無血浮則短氣弱則有熱而自汗出趺陽脈浮而澀浮則氣滿澀則有寒喜噫吞酸其氣而下少腹則寒少陰脈弱而微微則少血弱則生風微弱相搏陰中惡寒胃氣下泄吹而正喧師曰胃氣下泄吹而正喧此穀氣之實也膏發導之少陰脈滑而數者陰中則生瘡少陰脈數則氣淋陰中生瘡婦人陰中蝕瘡爛狼牙湯洗之婦人臟腫如瓜陰中疼引腰痛者杏仁湯主之少陰脈弦者白腸必挺核少陰脈浮而動浮則為虛動則為痛婦人則脫下平婦人病生死證第八診婦人漏血下赤白日下血數升脈急疾者死遲者生診婦人漏下赤白不止脈小虛滑者生大緊實數者死診婦人新生乳子脈沉小滑者生實大堅弦急者死診婦人疝瘕積聚脈弦急者生虛弱小者死診婦人新生乳子因得熱病其脈懸小四肢溫者生寒清者死診婦人生產因中風傷寒熱病喘鳴而肩息脈實大浮緩者生小急者死診婦人生產之後寸口脈焱疾不調者死沉微附骨不絕者生金瘡在陰處出血不絕陰脈不能至陽者死接陽而復出者生平小兒雜病證第九小兒脈呼吸八至者平九至者傷十至者困診小兒脈多雀鬥要以三部脈為主若緊為風癇沉者乳不消弦急者客忤氣小兒是其日數應變蒸之時身熱而脈亂汗不出不欲食食輒吐哯者脈亂無苦也小兒脈沉而數者骨間有熱欲以腹按冷清也小兒大便赤青瓣飧泄脈小手足寒難已脈小手足溫易已小兒病困汗出如珠著身不流者死
