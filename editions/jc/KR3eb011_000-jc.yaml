front:
  text: 序脈理精微其體難辨弦緊浮芤展轉相類在心易了指下難明謂沉為伏則方治永乖以緩為遲則危殆立至況有數候俱見異病同脈者乎夫醫藥為用性命所繫和鵲至妙猶或加思仲景明審亦候形證一毫有疑則考校以求驗故傷寒有承氣之戒嘔噦發下焦之間而遺文遠旨代寡能用舊經秘述奧而不售遂令末學昧於原本斥茲偏見各逞己能致微痾成膏肓之變滯固絕振起之望良有以也今撰集岐伯以來逮於華佗經論要決合為十卷百病根原各以類例相從聲色證候靡不該備其王阮傅戴吳葛呂張所傳異同咸悉載錄誠能留心研窮究其微賾則可以比蹤古賢代無夭橫矣
