body:
  text: 卷十手檢圖三十一部經言肺者人之五臟華蓋也上以應天解理萬物主行精氣法五行四時知五味寸口之中陰陽交會中有五部前後左右各有所主上下中央分為九道浮沉結散知邪所在其道奈何岐伯曰脈大而弱者氣實血虛也脈大而長者病在下候浮直上下交通者陽脈也堅在腎急在肝實在肺前如外者足太陽也中央如外者足陽明也後如外者足少陽也中央直前者手少陰也中央直中者手心主也中央直後者手太陰也前如內者足厥陰也中央如內者足太陰也後如內者足少陰也前部左右彈者陽蹺也中部左右彈者帶脈也後部左右彈者陰蹺也從少陽之厥陰者陰維也從少陰之太陽者陽維也來大時小者陰絡也來小時大者陽絡也前如外者足太陽也動苦頭項腰痛浮為風澀為寒熱緊為宿食前如外者足太陽也動苦目眩頭頸項腰背強痛也男子陰下濕女子月水不利少腹痛引命門陰中痛子臟閉浮為風澀為寒血滑為勞熱緊為宿食針入九分卻至六分中央如外者足陽明也動苦頭痛面赤微滑苦大便不利腸鳴不能食足脛痹中央如外者足陽明也動苦頭痛面赤熱浮微滑苦大便不利喜氣滿滑者為飲澀為嗜臥腸鳴不能食足胻痹針入九分卻至六分後如外者足少陽也動苦腰背胻股肢節痛後如外者足少陽也浮為氣澀澀為風血急為轉筋弦為勞針入九分卻至六分上足三陽脈前如內者足厥陰也動苦少腹痛月經不利子臟閉前如內者足厥陰也動苦少腹痛與腰相連大便不利小便難莖中痛女子月水不利陰中寒子門壅絶內少腹急男子疝氣兩丸上入淋也針入六分卻至三分中央如內者足太陰也動苦胃中痛食不下咳唾有血足脛寒少氣身重從腰上狀如居水中中央如內者足太陰也動苦腹滿上脘有寒食不下病以飲食得之沉澀者苦身重四肢不動食不化煩滿不能臥足脛痛苦寒時咳血泄利黃針入六分卻至三分後如內者足少陰也動苦少腹痛與心相引背痛淋從高墮下傷於內小便血後如內者足少陰也動苦小腹痛與心相引背痛淋從高墮下傷於尻內便血裡急月水來上搶心胸脅滿拘急股裡急也針入六分卻至三分上足三陰脈前部左右彈者陽蹺也動苦腰背痛微澀為風癇取陽蹺前部左右彈者陽蹺也動苦腰痛癲癇惡風偏枯僵仆羊鳴𤸷痹皮膚身體強一作淫痹直取陽蹺在外踝上三寸直絶骨是中部左右彈者帶脈也動苦少腹痛引命門女子月水不來絶繼復下止陰闢寒令人無子男子苦少腹拘急或失精也後部左右彈者陰蹺也動苦癲癇寒熱皮膚強一作淫痹後部左右彈者陰蹺也動苦少腹痛裡急腰及髖窖下相連陰中痛男子陰疝女子漏下不止上陽蹺陰蹺帶脈中央直前者手少陰也動苦心痛微堅腹脅急實堅者為感忤純虛者為下利腸鳴滑者為有娠女子陰中癢痛痛出玉門上一分前中央直中者手心主也動苦心痛面赤食苦咽多喜怒微浮者苦悲傷恍惚不樂也澀為心下寒沉為恐怖如人捕之狀也時寒熱有血氣中央直後者手太陰也動苦咳逆氣不得息浮為內風緊澀者胸中有積熱時咳血也有沉熱上手三陰脈從少陰斜至太陽是陽維也動苦肌肉痹癢從少陰斜至太陽是陽維也動苦顛僵仆羊鳴手足相引甚者失音不能言癲疾直取客主人兩陽維脈在外踝絶骨下二寸從少陽斜至厥陰是陰維也動苦癲癇僵仆羊鳴從少陽斜至厥陰是陰維也動苦僵仆失音肌肉淫癢痹汗出惡風脈來暫大暫小是陰絡也一作結動苦肉痹應時自發身洗洗也脈來暫小暫大者是陽絡也一作結動苦皮膚痛下部不仁汗出而寒也肺脈之來也如循榆葉曰平如風吹毛曰病狀如連珠者死期丙丁日禺中日中心脈之來也如反筍莞大曰平如連珠曰病前曲後居如帶鉤者死期壬癸日人定夜半肝脈之來也搏而弱曰平如張新弓弦曰病如雞踐地者死期庚辛日晡時日入脾脈之來也阿阿如緩曰平來如雞舉足曰病如鳥之啄如水之漏者死期甲乙日平旦日出腎脈之來也微細以長曰平來如彈石曰病去如解索者死期戊己日食時日昳黃昏雞鳴寸口中脈躁竟尺關中無脈應陽干陰也動苦腰背腹痛陰中若傷足寒刺足太陽少陰直絶骨入九分灸太陰五壯尺中脈堅實竟尺寸口無脈應陰乾陽也動苦兩脛腰重少腹痛癲疾刺足太陰踝上三寸針入五分又灸太陽陽蹺在足外踝上三寸直絶骨是也寸口脈緊直至魚際下小按之如持維子一作雞毛狀其病腸鳴足痹痛酸腹滿不能食得之寒濕剌陽維在外踝上三寸間也入五分此脈出魚一作原際寸口脈沉著骨反仰其手乃得之此腎脈也動苦少腹痛腰體酸癲疾刺腎俞入七分又刺陰維入五分初持寸口中脈如細堅狀久按之大而深動苦心下有寒胸脅苦痛陰中痛不欲近丈夫也此陰逆刺期門入六分又刺腎俞入五分可灸胃脘七壯初持寸口中脈如躁狀洪大久按之細而牢堅動苦腰腹相引痛以下至足胻重也不能食刺腎俞入四分至五分亦可灸胃脘七壯尺寸俱沉但有關上脈苦寒心下痛尺寸俱沉關上無有者苦心下喘尺寸俱數有熱俱遲有寒尺寸俱微厥血氣不足其人少氣尺寸俱濡弱發熱惡寒汗出一云內溫熱手足逆冷汗出寸口沉胸中痛引背一云短氣關上沉心痛上吞酸尺中沉引背痛寸口伏胸中有逆氣關上伏有水氣泄溏尺中伏水穀不消寸口弦胃中拘急一作心下愊愊關上弦胃中有寒心下拘急尺中弦少腹臍下拘急寸口緊頭痛逆氣關上緊心下痛尺中緊臍下少腹痛寸口澀無陽少氣關上澀無血厥冷尺中澀無陰厥冷寸口微無陽外寒關上微中實一作胃虛能食故里急一作無胃氣尺中微無陰厥冷腹中拘急寸口滑胸滿逆關上滑中實逆尺中滑下利少氣寸口數即吐關上數胃中有熱尺中數惡寒小便赤黃寸口實即生熱虛即生寒關上實即痛虛即脹滿尺中實即小便難少腹牢痛虛即閉澀寸口芤吐血微芤衄血關上芤胃中虛尺中芤下血微芤小便血寸口浮其人中風發熱頭痛關上浮腹痛心下滿尺中浮小便難寸口遲上焦有寒關上遲弱無胃氣有熱尺中遲下焦有寒背痛寸口濡陽弱自汗出關上濡下重尺中濡少血發熱惡寒寸弱陽氣少少關無缺尺弱少血
