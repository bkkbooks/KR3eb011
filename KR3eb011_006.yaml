body:
  text: 卷六肝足厥陰經病證第一肝氣虛則恐實則怒肝氣虛則夢見園苑生草得其時則夢伏樹下不敢起肝氣盛則夢怒厥氣客於肝則夢山林樹木病在肝平旦慧下晡甚夜半靜病先發於肝者頭目眩脅痛支滿一日之脾閉塞不通身痛體重二日之胃而腹脹三日之腎少腹腰脊痛脛痠十日不已死冬日入夏早食肝脈搏堅而長色不青當病墜墮若搏因血在脅下令人喘逆若軟而散其色澤者當病溢飲溢飲者濕暴多飲而溢一作易入肌皮腸胃之外也肝脈沉之而急浮之亦然苦脅下痛有氣支滿引少腹而痛時小便難苦目眩頭痛腰背痛足為逆寒時癃女人月使不來時亡時有得之少時有所墜墮青脈之至也長而左右彈診曰有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭痛肝中風者頭目瞤兩脅痛行常傴令人嗜甘如阻婦狀肝中寒者其人洗洗惡寒翕翕發熱面翕然赤漐漐有汗胸中煩熱肝中寒者其人兩臂不舉舌本又作大燥善太息胸中痛不得轉側時盜汗咳食已吐其汁肝主胸中喘怒罵其脈沉胸中叉窒欲令人推按之有熱鼻窒凡有所墜墮惡血留內若有所大怒氣上而不能下積於左脅下則傷肝肝傷者其人脫肉又臥口欲得張時時手足青目瞑瞳人痛此為肝臟傷所致也肝脹者脅下滿而痛引少腹肝水者其人腹大不能自轉側而脅下腹中痛時時津液微生小便續通肺乘肝即為癰腫心乘肝必吐利肝著者其病人常欲蹈其胸上先未苦時但欲飲熱肝之積名曰肥氣在左脅下如覆杯有頭足如龜鱉狀久久不愈發咳逆痎瘧連歲月不已以季夏戊己日得之何也肺病傳肝肝當傳脾脾適以季夏王王者不受邪肝復欲還肺肺不肯受因留結為積故知肥氣以季夏得之肝病其色青手足拘急脅下苦滿或時眩冒共脈弦長此為可治宜服防風竹瀝湯秦艽散春當刺大敦夏刺行間冬刺曲泉皆補之季夏刺太衝秋刺中郤皆瀉之又當灸期門百壯背第九椎五十壯肝病者必兩脅下痛引少腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之若欲治之當取其經足厥陰與少陽氣逆則頭目痛耳聾不聰頰腫取血者邪在肝則兩脅中痛寒中惡血在內胻善瘛節時腫取之行間以引脅下補三里以溫胃中取血脈以散惡血取耳間青脈以去其瘛足厥陰之脈起於大指聚毛之際上循足趺上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股入陰毛中環陰器抵少腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺中是動則病腰痛不可以俯仰丈夫頽疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆洞泄狐疝遺溺閉癃盛者則寸口大一倍於人迎虛者則寸口反小於人迎足厥陰之別名曰蠡溝去內踝上五寸別走少陽其別者循經上睪結於莖其病氣逆則睪腫卒疝實則挺長熱虛則暴癢取之所別肝病胸滿脅脹善恚怒叫呼身體有熱而復惡寒四肢不舉面目白身體滑其脈當弦長而急今反短澀其色當青而反白者此是金之剋木為大逆十死不治膽足少陽經病證第二膽病者善太息口苦嘔宿汁心淡淡恐如人將捕之嗌中介介然數唾候在足少陽之本末亦見其脈之陷下者灸之其寒熱刺陽陵泉善嘔有苦汁長太息心中淡淡善悲恐如人將捕之邪在膽逆在胃膽液則口苦胃氣逆則嘔苦汁故曰嘔膽刺三里以下胃氣逆刺足少陽血絡以閉膽卻調其虛實以去其邪也膽脹者脅下痛脹口苦太息厥氣客於膽則夢鬥訟足少陽之脈起於目兌眥上抵頭角下耳後循頸行手少陽之脈前至肩上卻交手少陽之後入缺盆其支者從耳後入耳中出走耳前至兌眥後其支者別兌眥下大迎合手少陽於䪼一本云別兌眥上迎手少陽於巔下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸中過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足趺上出小指次指之端其支者趺上入大指之間循大指歧內出其端還貫入爪甲出三毛是動則病口苦善太息心脅痛不能反側甚則面微塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛角頷痛目兌眥痛缺盆中腫痛腋下腫馬刀俠癭汗出振寒瘧胸中脅肋髀膝外至胻絶骨外踝前及諸節皆痛小指次指不用盛者則人迎大一倍於寸口虛者則人迎反小於寸口也心手少陰經病證第三心氣虛則悲不已實則笑不休心氣虛則夢救火陽物得其時則夢燔灼心氣盛則夢喜笑及恐畏厥氣客於心則夢丘山煙火病在心日中慧夜半甚平旦靜病先發於心者心痛一日之肺喘咳三日之肝脅痛支滿五日之脾閉塞不通身痛體重三日不已死冬夜半夏日中心脈搏堅而長當病舌卷不能言其軟而散者當病消渴自已心脈沉之小而緊浮之不喘苦心下聚氣而痛食不下喜咽唾時手足熱煩滿時忘不樂喜太息得之憂思赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之心脈急名曰心疝少腹當有形其以心為牡臟小腸為之使故少腹當有形邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人即畏一作衰合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者即為癲陽氣衰者即為狂五臟者魂魄之宅舍精神之所依託也魂魄飛揚者其五臟空虛也即邪神居之神靈所使鬼而下之脈短而微其臟不足則魂魄不安魂屬於肝魄屬於肺肺主津液即為涕泣肺氣衰者即為泣出肝氣衰者魂則不安肝主善怒其聲呼心中風者翕翕發熱不能起心中飢而欲食食則嘔心中寒者其人病心如啖蒜狀劇者心痛徹背背痛徹心如蟲注其脈浮者自吐乃愈愁憂思慮則傷心心傷則苦驚喜忘善怒心傷者其人勞倦即頭面赤而下重心中痛徹背自發煩熱當臍挑手其脈弦此為心臟傷所致也心脹者煩心短氣臥不安心水者其人身體重一作腫而少氣不得臥煩而躁其陰大腫腎乘心必癃真心痛手足清至節心痛甚旦發夕死夕發旦死心腹痛懊憹發作腫聚往來上下行痛有休作心腹中熱苦渴涎出者是蛔咬也以手聚而堅持之毋令得移以大針刺之久持之蟲不動乃出針腸中有蟲蛔咬皆不可取以小針心之積名曰伏梁起於臍上上至心大如臂久久不愈病煩心心痛以秋庚辛日得之何也腎病傳心心當傳肺肺適以秋王王者不受邪心復欲還腎腎不肯受因留結為積故知伏梁以秋得之心病其色赤心痛短氣手掌煩熱或啼笑罵詈悲思愁慮面赤身熱其脈實大而數此為可治春當刺中衝夏刺勞宮季夏刺太陵皆補之秋刺間使冬刺曲澤皆瀉之此是手厥陰心包絡經又當灸巨闕五十壯背第五椎百壯心病者胸內痛脅支滿兩脅下痛膺背肩甲間痛兩臂內痛虛則胸腹大脅下與腰背相引而痛取其經手少陰太陽舌下血者其變病刺郤中血者邪在心則病心痛善悲時眩僕視有餘不足而調之其輸黃帝曰手少陰之脈獨無輸何也岐伯曰少陰者心脈也心者五臟六腑之大主也心為帝王精神之所舍其臟堅固邪不能客客之則傷心心傷則神去神去則身死矣故諸邪在於心者皆在心之包絡包絡者心主之脈也故少陰無輸焉少陰無輸心不病乎對曰其外經腑病臟不病故獨取其經於掌後兌骨之端也手心主之脈起於胸中出屬心包下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端是動則病手心熱肘臂攣急腋腫甚則胸脅支滿心中淡淡大動面赤目黃善笑不休是主脈所生病者煩心心痛掌中熱盛者則寸口大一倍於人迎虛者則寸口反小於人迎也手心主之別名曰內關去腕二寸出於兩筋間循經以上繫於心包絡心系氣實則心痛虛則為煩心取之兩筋間心病煩悶少氣大熱熱上蕩心嘔吐咳逆狂語汗出如珠身體厥冷其脈當浮今反沉濡而滑其色當赤而反黑者此是水之剋火為大逆十死不治小腸手太陽經病證第四小腸病者少腹痛腰脊控睪而痛時窘之復耳前熱若寒甚獨肩上熱及手小指次指之間熱若脈陷者此其候也少腹控睪引腰脊上衝心邪在小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃動肝肺散於肓結於厭一作齊故取之肓原以散之刺太陰以與之取厥陰以下之取巨虛下廉以去之按其所過之經以調之小腸有寒其人下重便膿血有熱必痔小腸有宿食常暮發熱明日復止小腸脹者少腹䐜脹引腹而痛厥氣客於小腸則夢聚邑街衢手太陽之脈起之於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩骨之間上循臑外後廉出肩解繞肩甲交肩上入缺盆向腋絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目兌眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰頷腫頸肩臑肘臂外後廉痛盛者則人迎大再倍於寸口虛者則人迎反小於寸口也脾足太陰經病證第五脾氣虛則四肢不用五臟不安實則腹脹涇溲不利脾氣虛則夢飲食不足得其時則夢築垣蓋屋脾氣盛則夢歌樂體重手足不舉厥氣客於脾則夢丘陵大澤壞屋風雨病在脾日昳慧平旦甚日中持下晡靜病先發於脾閉塞不通身痛體重一日之胃而腹脹二日之腎少腹腰脊痛脛痠三日之膀胱背呂筋痛小便閉十日不已死冬人定夏晏食脾脈搏堅而長其色黃當病少氣其軟而散色不澤者當病足骭腫若水狀脾脈沉之而濡浮之而虛苦腹脹煩滿胃中有熱不嗜食食而不化大便難四肢苦痹時不仁得之房內月使不來來而頻並黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風寸口脈弦而滑弦則為痛滑則為實痛即為急實即為踴痛踴相搏即胸脅搶急趺陽脈浮而澀浮即胃氣微澀即脾氣衰微衰相搏即呼吸不得此為脾家失度寸口脈雙緊即為入其氣不出無表有里心下痞堅趺陽脈微而澀微即無胃氣澀即傷脾寒在於膈而反下之寒積不消胃微脾傷穀氣不行食己自噫寒在胸膈上虛下實穀氣不通為祕塞之病寸口脈緩而遲緩則為陽其氣長遲則為陰榮氣促榮衛俱和剛柔相得三焦相承其氣必強趺陽脈滑而緊滑即胃氣實緊即脾氣傷得食而不消者此脾不治也能食而腹不滿此為胃氣有餘腹滿而不能食心下如飢此為胃氣不行心氣虛也得食而滿者此為脾家不治脾中風者翕翕發熱形如醉人腹中煩重皮肉瞤瞤而短氣也凡有所擊僕若醉飽入房汗出當風則傷脾脾傷則中氣陰陽離別陽不從陰故以三分候死生脾氣弱病利下白腸垢大便堅不能更衣汗出不止名曰脾氣弱或五液注下青黃赤白黑病人鼻下平者胃病也微赤者病發癰微黑者有熱青者有寒白者不治唇黑者胃先病微燥而渴者可治不渴者不可治臍反出者此為脾先落一云先終脾脹者善噦四肢急體重不能衣一作枚脾水者其人腹大四肢苦重津液不生但苦少氣小便難趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約脾約者其人大便堅小便利而反不渴凡人病脈已解而反暮微煩者人見病者瘥安而強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈脾之積名曰痞氣在胃脘覆大如盤久久不愈病四肢不收黃疸食飲不為肌膚以冬壬癸日得之何也肝病傳脾脾當傳腎腎適以冬王王者不受邪脾復欲還肝肝不肯受因留結為積故知痞氣以冬得之脾病其色黃飲食不消腹苦脹滿體重節痛大便不利其脈微緩而長此為可治宜服平胃丸瀉脾丸茱萸丸附子湯春當刺隱白冬刺陰陵泉皆瀉之夏刺大都季夏刺公孫秋刺商丘皆補之又當灸章門五十壯背第十一椎百壯脾病者必身重苦飢足痿不收素問作善肌肉痿足不收行善瘛腳下痛虛則腹脹腸鳴溏泄食不化取其經足太陰陽明少陰血者邪在脾胃肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱皆調其三里足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上腨內循胻骨後交出厥陰之前上循膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔一作吐胃脘痛腹脹善噫得後與氣則快然而衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛寒瘧溏瘕泄水閉黃疸好臥不能食肉唇青強立股膝內痛厥足大趾不用盛者則寸口大三倍於人迎虛者則寸口反小於人迎足太陰之別名曰公孫去本節後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腹中切痛虛則鼓脹取之所別脾病其色黃體青失溲直視唇反張爪甲青飲食吐逆體重節痛四肢不舉其脈當浮大而緩今反弦急其色當黃今反青此是木之剋土為大逆十死不治胃足陽明經病證第六胃病者腹脹胃脘當心而痛上支兩脅膈咽不通飲食不下取三里飲食不下隔塞不通邪在胃脘在上脘則抑而刺之在下脘則散而去胃脈搏堅而長其色赤當病折髀其軟而散者當病食痹髀痛胃中有癖食冷物者痛不能食食熱即能食胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難診得胃脈病形何如曰胃實則脹虛則泄病先發於胃脹滿五日之腎少腹腰脊痛脛痠三日之膀胱背呂筋痛小便閉五日上之脾閉塞不通身痛體重靈樞云上之心六日不已死冬夜半後夏日昳六日一作三日脈浮而芤浮則為陽芤則為陰浮芤相搏胃氣生熱其陽則絶趺陽脈浮者胃氣虛也趺陽脈浮大者此胃家微虛煩圊必日再行芤而有胃氣者脈浮之大而軟微按之芤故知芤而有胃氣也趺陽脈數者胃中有熱即消穀引食趺陽脈澀者胃中有寒水穀不化趺陽脈粗粗而浮者其病難治趺陽脈浮遲者故久病趺陽脈虛則遺溺實則失氣動作頭痛重熱氣朝者屬胃厥氣客於胃則夢飲食足陽明之脈起於鼻交頞中旁約太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起胃下口循腹裡下至氣街中而合以下髀關抵伏菟下入膝臏中下循胻外廉下足跗入中指內間其支者下膝三寸而別以下入中指外間其支者別跗上入大指間出其端是動則病悽悽然振寒善伸數欠顏黑病至缶公人與火聞木音則惕然而驚心動欲獨閉戶牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血血一作胃所生病者狂瘧一作瘛溫淫汗出鼽衄口喎唇緊頸腫喉痹大腹水腫膝臏痛循膺乳街股伏菟骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿盛者則人迎大三倍於寸口虛者則人迎反小於寸口也肺手太陰經病證第七肺氣虛則鼻息利少氣實則喘喝胸憑仰息肺氣虛則夢見白物見人斬血藉藉得其時則夢見兵戰肺氣盛則夢恐懼哭泣厥氣客於肺則夢飛揚見金鐵之器奇物病在肺下晡慧日中甚夜半靜病先發於肺喘咳三日之肝脅痛支滿一日之脾閉塞不通身痛體重五日之胃腹脹十日不已死冬日入夏日出肺脈搏堅而長當病唾血其濡而散者當病漏汗漏一作灌至今不復散發肺脈沉之而數浮之而喘苦洗洗寒熱腹滿腸中熱小便赤肩背痛從腰以上汗出得之房內汗出當風白脈之至也喘而浮大上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之因醉而使內也肺中風者口燥而喘身運而重冒而腫脹肺中寒者其人吐濁涕形寒寒飲則傷肺以其兩寒相感中外皆傷故氣逆而上行肺傷者其人勞倦則咳唾血其脈細緊浮數皆吐血此為躁擾嗔怒得之肺傷氣擁所致肺脹者虛而滿喘咳逆倚息目如脫狀其脈浮肺水者其人身體重而小便難時時大便鴨溏肝乘肺必作虛脈軟而弱弱反在關軟反在巔浮反在上弱反在下浮則為陽弱則血不足必弱為虛浮弱自別浮則自出弱則為入浮則為出不入此為有表無里弱則為入不出此為無表有里陽出極汗齊腰而還此為無表有里故名曰厥陽在當汗出不汗出趺陽脈浮緩少陽微緊微為血虛緊為微寒此為鼠乳其病屬肺肺之積名曰息賁在右脅下覆大如杯久久不愈病灑灑寒熱氣逆喘咳發肺癰以春甲乙日得之何也心病傳肺肺當傳肝肝適以春王王者不受邪肺復欲還心心不肯受因留結為積故知息賁以春得之肺病其色白身體但寒無熱時時咳其脈微遲為可治宜服五味子大補肺湯瀉肺散春當刺少商夏刺魚際皆瀉之季夏刺太淵秋刺經渠冬刺尺澤皆補之又當灸膻中百壯背第三椎二十五壯肺病者必喘咳逆氣肩息背痛汗出尻陰股膝攣髀腨胻足皆痛虛則少氣不能報息耳聾嗌乾取其經手太陰足太陽之外厥陰內少陰血者邪在肺則皮膚痛發寒熱上氣氣喘汗出咳動肩背取之膺中外輸背第三椎之旁以手痛按之快然乃刺之取之缺盆中以越之手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中後循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直次指內廉出其端是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀是為臂厥是主肺所生病者咳上氣喘喝煩心胸滿臑臂內前廉痛掌中熱氣盛有餘則肩背痛風汗出小便數而欠氣虛則肩背痛寒少氣不足以息溺色變卒遺失無度盛者則寸口大三倍於人迎虛者則寸口反小於人迎也手太陰之別名曰列缺起於腋下一云腕上分間別走陽明其別者並太陰之經直入掌中散入於魚際其實則手兌掌起虛則欠咳小便遺數取之去腕一寸半肺病身當有熱咳嗽短氣唾出膿血其脈當短澀今反浮大其色當白而反赤者此是火之剋金為大逆十死不治大腸手陽明經病證第八大腸病者腸中切痛而鳴濯濯冬日重感於寒則泄當臍而痛不能久立與胃同候取巨虛上廉腸中雷鳴氣上衝胸喘不能久立邪在大腸刺肓之原巨虛上廉三里大腸有寒鶩溏有熱便腸垢大腸有宿食寒栗發熱有時如瘧狀大腸脹者腸鳴而痛寒則泄食不化厥氣客於大腸則夢田野手陽明之脈起於大指次指之端外側循指上廉出合谷兩骨之間上入兩筋之中循臂上廉上入肘外廉循臑外前廉上肩出髃骨之前廉上出柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆直入上頸貫頰入下齒縫中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛䪼腫是主津所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣盛有餘則當脈所過者熱腫虛則寒栗不復盛者則人迎大三倍於寸口虛者則人迎反小於寸口也腎足少陰經病證第九腎氣虛則厥逆實則脹滿四肢正黑腎氣虛則夢見舟船溺人得其時夢伏水中若有畏怖腎氣盛則夢腰脊兩解不相屬厥氣客於腎則夢臨淵沒居水中病在腎夜半慧日乘四季其下晡靜病先發於腎少腹腰脊痛脛痠三日之膀胱背呂筋痛小便閉二日上之心心痛三日之小腸脹四日不已死冬大食夏晏晡腎脈搏堅而長其色黃而赤當病折腰其軟而散者當病少血腎脈沉之大而堅浮之大而緊苦手足骨腫厥而陰不興腰脊痛少腹腫心下有水氣時脹閉時泄得之浴水中身未乾而合房內及勞倦發之黑脈之至也上堅而大有積氣在少腹與陰名曰腎痹得之沐浴清水而臥凡有所用力舉重若入房過度汗出如浴水則傷腎腎脹者腹滿引背央央然腰髀痛腎水者其人腹大臍腫腰重痛不得溺陰下濕如牛鼻頭汗其足逆寒大便反堅腎著之為病從腰以下冷腰重如帶五千錢腎著之病其人身體重腰中冷如冰狀一作如水洗狀一作如坐水中形如水狀反不渴小便自利食飲如故是其證也病屬下焦從身勞汗出衣里冷濕故久久得之腎之積名曰奔豚發於少腹上至心下如豚奔走之狀上下無時久久不愈病喘逆骨痿少氣以夏丙丁日得之何也脾病傳腎腎當傳心心適以夏王王者不受邪腎復欲還脾脾不肯受因留結為積故知奔豚以夏得之水流夜疾何以故師曰土休故流疾而有聲人亦應之人夜臥則脾不動搖脈為之數疾也腎病其色黑其氣虛弱吸吸少氣兩耳苦聾腰痛時時失精飲食減少膝以下清其脈沉滑而遲此為可治宜服內補散建中湯腎氣丸地黃煎春當刺湧泉秋刺伏留冬刺陰谷皆補之夏刺然谷季夏刺太溪皆瀉之又當灸京門五十壯背第十四椎百壯腎病者必腹大脛腫痛喘咳身重寢汗出憎風虛即胸中痛大腹小腹痛清厥意不樂取其經足少陰太陽血者邪在腎則骨痛陰痹陰痹者按之而不得腹脹腰痛大便難肩背頸項強痛時眩取之湧泉崑崙視有血者盡取之足少陰之脈起於小指之下斜趣足心出然骨之下循內踝之後別入跟中以上腨內出膕中內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病飢而不欲食面黑如炭色一作地色咳唾則有血喉鳴而喘坐而欲起目䀮䀮無所見心懸若飢狀氣不足則善恐心惕惕若人將捕之是為骨厥一作痿是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛灸則強食而生害一作肉緩帶被髮大杖重履而步盛者則寸口大再倍於人迎虛者則寸口反小於人迎也足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別腎病手足逆冷面赤目黃小便不禁骨節煩疼少腹結痛氣衝於心其脈當沉細而滑今反浮大其色當黑而反黃此是土之剋水為大逆十死不治膀胱足太陽經病證第十膀胱病者少腹偏腫而痛以手按之則欲小便而不得肩上熱若脈陷足小指外側反脛踝後皆熱若脈陷者取委中膀胱脹者少腹滿而氣癃病先發於膀胱者背呂筋痛小便閉五日之腎少腹腰脊痛脛痠一日之小腸脹一日之脾閉塞不通身痛體重二日不已死冬雞鳴夏下晡一云日夕厥氣客於膀胱則夢遊行足太陽之脈起於目內眥上額交巔上其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下會於後陰下貫臀入膕中其支者從膊內左右別下貫髖一作肺過髀樞循髀外後廉過一本下合膕中以下貫腨內出外踝之後循京骨至小指外側是動則病沖頭痛目似脫項似拔脊痛腰似折髀不可以曲膕如結腨如列是為踝厥是主筋所生病者痔瘧狂癲疾頭腦頂痛目黃淚出鼽衄項背腰尻膕腨腳皆痛小指不用盛者則人迎大再倍於寸口虛者則人迎反小於寸口也三焦手少陽經病證第十一三焦病者腹脹氣滿小腹尤堅不得小便窘急溢則為水留則為脹候在足太陽之外大絡在太陽少陽之間赤見於脈取委陽少腹病腫不得小便邪在三焦約取太陽大絡視其結脈與厥陰小絡結而血者腫上及胃脘取三里三焦脹者氣滿於皮膚殼殼然而堅不疼熱在上焦因咳為肺痿熱在中焦因堅熱在下焦因溺血手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆交膻中散絡心包下膈遍屬三焦其支者從膻中上出缺盆上項挾耳後直上出耳上角以屈下額至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目兌眥是動則病耳聾輝輝焞焞嗌腫喉痹是主氣所生病者汗出目兌眥痛頰腫耳後肩臑肘臂外皆痛小指次指不用盛者則人迎大一倍於寸口虛者則人迎反小於寸口也
