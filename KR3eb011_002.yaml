body:
  text: 卷二平三關陰陽二十四氣脈第一左手關前寸口陽絶者無小腸脈也苦臍痹小腹中有疝瘕王月王字一本作五即冷上搶心刺手心主經治陰心主在掌後橫理中即太陵穴也左手關前寸口陽實者小腸實也苦心下急痹一作急痛小腸有熱小便赤黃刺手太陽經治陽一作手少陽者非太陽在手小指外側本節陷中即後溪穴也左手關前寸口陰絶者無心脈也苦心下毒痛掌中熱時時善嘔口中傷爛刺手太陽經治陽左手關前寸口陰實者心實也苦心下有水氣憂恚發之刺手心主經治陰左手關上陽絶者無膽脈也苦膝疼口中苦昧目善畏如見鬼狀多驚少力刺足厥陰經治陰在足大指間即行間穴也或刺三毛中左手關上陽實者膽實也苦腹中實不安身軀習習也刺足少陽經治陽在足上第二指本節後一寸第二指當云小指次指即臨泣穴也左手關上陰絶者無肝脈也苦癃遺溺難言脅下有邪氣善吐刺足少陽經治陽左手關上陰實者肝實也苦肉中痛動善轉筋刺足厥陰經治陰左手關後尺中陽絶者無膀胱脈也苦逆冷婦人月使不調王月則閉男子失精尿有餘瀝刺足少陰經治陰在足內踝下動脈即太溪穴也左手關後尺中陽實者膀胱實也苦逆冷脅下有邪氣相引痛刺足太陽經治陽在足小指外側本節後陷中即束骨穴也左手關後尺中陰絶者無腎脈也苦足下熱兩髀裡急精氣竭少勞倦所致刺足太陽經治陽左手關後尺中陰實者腎實也苦恍惚健忘目視䀮䀮耳聾悵悵善鳴刺足少陰經治陰右手關前寸口陽絶者無大腸脈也苦少氣心下有水氣立秋節即咳刺手太陰經治陰在魚際間即太淵穴也右手關前寸口陽實者大腸實也苦腸中切痛如錐刀所刺無休息時刺手陽明經治陽在手腕中即陽溪穴也右手關前寸口陰絶者無肺脈也苦短氣咳逆喉中塞噫逆刺手陽明經治陽右手關前寸口陰實者肺實也苦少氣胸中滿彭彭與肩相引刺手太陰經治陰右手關上陽絶者無胃脈也苦吞酸頭痛胃中有冷刺足太陰經治陰在足大指本節後一寸即公孫穴也右手關上陽實者胃實也苦腸中伏伏一作愊愊不思食物得食不能消刺足陽明經治陽在足上動脈即衝陽穴也右手關上陰絶者無脾脈也苦少氣下利腹滿身重四肢不欲動善嘔刺足陽明經治陽右手關上陰實者脾實也苦腸中伏伏如堅狀大便難刺足太陰經治陰右手關後尺中陽絶者無子戶脈也苦足逆寒絶産帶下無子陰中寒刺足少陰經治陰右手關後尺中陽實者膀胱實也苦少腹滿引腰痛刺足太陽經治陽右手關後尺中陰絶者無腎脈也苦足逆冷上搶胸痛夢入水見鬼善厭寐黑色物來掩人上刺足太陽經治陽右手關後尺中陰實者腎實也苦骨疼腰脊痛內寒熱刺足少陰經治陰上脈二十四氣事平人迎神門氣口前後脈第二心實左手寸口人迎以前脈陰實者手厥陰經也病苦閉大便不利腹滿四肢重身熱苦胃脹刺三里心虛左手寸口人迎以前脈陰虛者手厥陰經也病苦悸恐不樂心腹痛難以言心如寒狀恍惚小腸實左手寸口人迎以前脈陽實者手太陽經也病苦身熱熱來去汗出一作汗不出而煩心中滿身重口中生瘡小腸虛左手寸口人迎以前脈陽虛者手太陽經也病苦顱際偏頭痛耳頰痛心小腸俱實左手寸口人迎以前脈陰陽俱實者手少陰與太陽經俱實也病苦頭痛身熱大便難心腹煩滿不得臥以胃氣不轉水穀實也心小腸俱虛左手寸口人迎以前脈陰陽俱虛者手少陰與太陽經俱虛也病苦洞泄苦寒少氣四肢寒腸澼肝實左手關上脈陰實者足厥陰經也病苦心下堅滿常兩脅痛自忿忿如怒狀肝虛左手關上脈陰虛者足厥陰經也病苦脅下堅寒熱腹滿不欲飲食腹脹悒悒不樂婦人月經不利腰腹痛膽實左手關上脈陽實者足少陽經也病苦腹中氣滿飲食不下咽乾頭重痛灑灑惡寒脅痛膽虛左手關上脈陽虛者足少陽經也病苦眩厥痿足指不能搖躄坐不能起僵仆目黃失精䀮䀮肝膽俱實左手關上脈陰陽俱實者足厥陰與少陽經俱實也病苦胃脹嘔逆食不消肝膽俱虛左手關上脈陰陽俱虛者足厥陰與少陽經俱虛也病苦恍惚尸厥不知人妄見少氣不能言時時自驚腎實左手尺中神門以後脈陰實者足少陰經也病苦膀胱脹閉少腹與腰脊相引痛左手尺中神門以後脈陰實者足少陰經也病苦舌燥咽腫心煩嗌乾胸脅時痛喘咳汗出小腹脹滿腰背強急體重骨熱小便赤黃好怒好忘足下熱疼四肢黑耳聾腎虛左手尺中神門以後脈陰虛者足少陰經也病苦心中悶下重足腫不可以按地膀胱實左手尺中神門以後脈陽實者足太陽經也病苦逆滿腰中痛不可俯仰勞也膀胱虛左手尺中神門以後脈陽虛者足太陽經也病苦腳中筋急腹中痛引腰背不可屈伸轉筋惡風偏枯腰痛外踝後痛腎膀胱俱實左手尺中神門以後脈陰陽俱實者足少陰與太陽經俱實也病苦脊強反折戴眼氣上搶心脊痛不能自反側腎膀胱俱虛左手尺中神門以後脈陰陽俱虛者足少陰與太陽經俱虛也病苦小便利心痛背寒時時少腹滿肺實右手寸口氣口以前脈陰實者手太陰經也病苦肺脹汗出若露上氣喘逆咽中塞如欲嘔狀肺虛右手寸口氣口以前脈陰虛者手太陰經也病苦少氣不足以息嗌乾不朝津液大腸實右手寸口氣口以前脈陽實者手陽明經也病苦腹滿善喘咳面赤身熱喉咽一本作咽喉中如核狀大腸虛右手寸口氣口以前脈陽虛者手陽明經也病苦胸中喘腸鳴虛渴唇口乾目急善驚泄白肺大腸俱實右手寸口氣口以前脈陰陽俱實者手太陰與陽明經俱實也病苦頭痛目眩驚狂喉痹痛手臂卷唇吻不收肺大腸俱虛右手寸口氣口以前脈陰陽俱虛者手太陰與陽明經俱虛也病苦耳鳴嘈嘈時妄見光明情中不樂或如恐怖脾實右手關上脈陰實者足太陰經也病苦足寒脛熱腹脹滿煩擾不得臥脾虛右手關上脈陰虛者足太陰經也病苦泄注腹滿氣逆霍亂嘔吐黃疸心煩不得臥腸鳴胃實右手關上脈陽實者足陽明經也病苦腹中堅痛而熱千金作病苦頭痛汗不出如溫瘧唇口乾善噦乳癰缺盆腋下腫痛胃虛右手關上脈陽虛者足陽明經也病苦脛寒不得臥惡寒灑灑目急腹中痛虛鳴外臺作耳虛鳴時寒時熱唇口乾面目浮腫脾胃俱實右手關上脈陰陽俱實者足太陰與陽明經俱實也病苦脾脹腹堅搶脅下痛胃氣不轉大便難時反泄利腹中痛上衝肺肝動五臟立喘鳴多驚身熱汗不出喉痹精少脾胃俱虛右手關上脈陰陽俱虛者足太陰與陽明經俱虛也病苦胃中如空狀少氣不足以息四逆寒泄注不已腎實右手尺中神門以後脈陰實者足少陰經也病苦痹身熱心痛脊脅相引痛足逆熱煩腎虛右手尺中神門以後脈陰虛者足少陰經也病苦足脛小弱惡風寒脈代絶時不至足寒上重下輕行不可以按地少腹脹滿上搶胸脅痛引肋下膀胱實右手尺中神門以後脈陽實者足太陽經也病苦轉胞不得小便頭眩痛煩滿脊背強膀胱虛右手尺中神門以後脈陽虛者足太陽經也病苦肌肉振動腳中筋急耳聾忽忽不聞惡風颼颼作聲腎膀胱俱實右手尺中神門以後脈陰陽俱實者足少陰與太陽經俱實也病苦癲疾頭重與目相引痛厥欲起走反眼大風多汗腎膀胱俱虛右手尺中神門以後脈陰陽俱虛者足少陰與太陽經俱虛也病苦心痛若下重不自收篡反出時時苦洞泄寒中泄腎心俱痛一說云腎有左右而膀胱無二今用當以左腎合膀胱右腎合三焦平三關病候並治宜第三寸口脈浮中風發熱頭痛宜服桂枝湯葛根湯針風池風府向火灸身摩治風膏覆令汗出寸口脈緊苦頭痛骨肉疼是傷寒宜服麻黃湯發汗針眉沖顳顬摩治傷寒膏寸口脈微苦寒為衄宜服五味子湯摩茱萸膏令汗出寸口脈數即為吐以有熱在胃脘熏胸中宜服藥吐之及針胃脘服除熱湯若是傷寒七八日至十日熱在中煩滿渴者宜服知母湯寸口脈緩皮膚不仁風寒在肌肉宜服防風湯以藥薄尉之摩以風膏灸諸治風穴寸口脈滑陽實胸中壅滿吐逆宜服前胡湯針太陽巨闕瀉之寸口脈弦心下愊愊微頭痛心下有水氣宜服甘遂丸針期門瀉之寸口脈弱陽氣虛自汗出而短氣宜服茯苓湯內補散適飲食消息勿極勞針胃脘補之寸口脈澀是胃氣不足宜服乾地黃湯自養調和飲食針三里補之三里一作胃脘寸口脈芤吐血微芤者衄血空虛去血故也宜服竹皮湯黃土湯灸膻中寸口脈伏胸中逆氣噎塞不通是胃中冷氣上衝心胸宜服前胡湯大三建丸針巨闕上脘灸膻中寸口脈沉胸中引脅痛胸中有水氣宜服澤漆湯針巨闕瀉之寸口脈濡陽氣弱自汗出是虛損病宜服乾地黃湯薯蕷丸內補散牡蠣散並粉針太衝補之寸口脈遲上焦有寒心痛咽酸吐酸水宜服附子湯生薑湯茱萸丸調和飲食以暖之寸口脈實即生熱在脾肺嘔逆氣塞虛即生寒在脾胃食不消化有熱即宜服竹葉湯葛根湯有寒宜服茱萸丸生薑湯寸口脈細發熱吸吐宜服黃芩龍膽湯吐不止宜服橘皮桔梗湯灸中府寸口脈洪大胸脅滿宜服生薑湯白薇丸亦可紫菀湯下之針上脘期門章門上上部寸口十七條關脈浮腹滿不欲食浮為虛滿宜服平胃丸茯苓湯生薑前胡湯針胃脘先瀉後補之關脈緊心下苦滿急痛脈緊者為實宜服茱萸當歸湯又大黃湯兩治之良針巨闕下脘瀉之千金云服茱萸當歸湯又加大黃二兩佳關脈微胃中冷心下拘急宜服附子湯生薑湯附子丸針巨闕補之關脈數胃中有客熱宜服知母丸除熱湯針巨闕上脘瀉之關脈緩其人不欲食此胃氣不調脾氣不足宜服平胃丸補脾湯針章門補之關脈滑胃中有熱滑為熱實以氣滿故不欲食食即吐逆宜服紫菀湯下之大平胃丸針胃脘瀉之千金云宜服朴硝麻黃湯平胃丸關脈弦胃中有寒心下厥逆此以胃氣虛故爾宜服茱萸湯溫調飲食針胃脘補之關脈弱胃氣虛胃中有客熱脈弱為虛熱作病其說云有熱不可大攻之熱去則寒起正宜服竹葉湯針胃脘補之關脈澀血氣逆冷脈澀為血虛以中焦有微熱宜服乾地黃湯內補散針足太衝上補之關脈芤大便去血數斗者以膈輸傷故也宜服生地黃並生竹皮湯灸膈輸若重下去血者針關元甚者宜服龍骨丸必愈關脈伏中焦有水氣溏泄宜服水銀丸針關元利小便溏泄便止關脈沉心下有冷氣苦滿吞酸宜服白薇茯苓丸附子湯針胃脘補之關脈濡苦虛冷脾氣弱重下病宜服赤石脂湯女萎丸針關元補之關脈遲胃中寒宜服桂枝丸茱萸湯針胃脘補之關脈實胃中痛宜服梔子湯茱萸烏頭丸針胃脘補之關脈牢脾胃氣塞盛熱即腹滿響響宜服紫菀丸瀉脾丸針灸胃脘瀉之關脈細虛腹滿宜服生薑茱萸蜀椒湯白薇丸針灸三脘關脈洪胃中熱必煩滿宜服平胃丸針胃脘先瀉後補之上中部關脈十八條尺脈浮下熱風小便難宜服瞿麥湯滑石散針橫骨關元瀉之尺脈緊臍下痛宜服當歸湯灸天樞針關元補之尺脈微厥逆小腹中拘急有寒氣宜服小建中湯一本更有四順湯針氣海尺脈數惡寒臍下熱痛小便赤黃宜服雞子湯白魚散針橫骨瀉之尺脈緩腳弱下腫小便難有餘瀝宜服滑石湯瞿麥散針橫骨瀉之尺脈滑血氣實婦人經脈不利男子尿血宜服朴硝煎大黃湯下去經血針關元瀉之尺脈弦小腹疼小腹及腳中拘急宜服建中湯當歸湯針氣海瀉之尺脈弱陽氣少發熱骨煩宜服前胡湯乾地黃湯茯苓湯針關元補之尺脈澀足脛逆冷小便赤宜服附子四逆湯針足太衝補之尺脈芤下焦虛小便去血宜服竹皮生地黃湯灸丹田關元亦針補之尺脈伏小腹痛癥疝水穀不化宜服大平胃丸桔梗丸針關元補之桔梗丸一云結腸丸尺脈沉腰背痛宜服腎氣丸針京門補之尺脈濡苦小便難千金云腳不收風痹宜服瞿麥湯白魚散針關元瀉之尺脈遲下焦有寒宜服桂枝丸針氣海關元補之尺脈實小腹痛小便不禁宜服當歸湯加大黃一兩以利大便針關元補之止小便尺脈牢腹滿陰中急宜服葶藶子茱萸丸針丹田關元中極上下部尺脈十六條平奇經八脈病第四脈有奇經八脈者何謂也然有陽維陰維有陽蹺陰蹺有沖有督有任有帶之脈凡此八脈者皆不拘於經故曰奇經八脈也經有十二絡有十五凡二十七氣相隨上下何獨不拘於經也然聖人圖設溝渠通利水道以備不虞天雨降下溝渠溢滿雱霈妄行當此之時聖人不能復圖也此絡脈流溢諸經不能復拘也奇經八脈者既不拘於十二經皆何起何系也然陽維者起於諸陽之會陰維者起於諸陰之交陽維陰維者維絡於身溢畜不能環流溉灌諸經者也陽蹺者起於跟中循外踝而上行入風池陰蹺者亦起於跟中循內踝而上行至咽喉交貫衝脈衝脈者起於關元循腹裡直上至咽喉中一云衝脈者起於氣衝並陽明之經夾臍上行至胸中而散也督脈者起於下極之輸並於脊裡循背上至風府衝脈者陰脈之海也督脈者陽脈之海也任脈者起於胞門子戶夾臍上行至胸中一云任脈者起於中極之下以上毛際循腹裡上關元至喉咽帶脈者起於季肋難經作季脅回身一周此八者皆不繫於十二經故曰奇經八脈者也奇經之為病何如然陽維維於陽陰維維於陰陰陽不能相維悵然失志容容難經作溶溶不能自收持悵然者其人驚即維脈緩緩即令身不能自收持即失志善忘恍惚也陽維為病苦寒熱陰維為病苦心痛陽維為衛衛為寒熱陰維為榮榮為血血者主心故心痛也陰蹺為病陽緩而陰急陰蹺在內踝病即其脈急當從內踝以上急外踝以上緩陽蹺為病陰緩而陽急陽蹺在外踝病即其脈急其人當從外踝以上急內踝以上緩沖之為病逆氣而裡急衝脈從關元至喉咽故其為病逆氣而裡急督之為病脊強而厥督脈在背病即其脈急故令脊強也任之為病其內苦結男子為七疝女子為瘕聚任脈起於胞門子戶故其病結為七疝瘕聚帶之為病苦腹滿腰容容難經作溶溶若坐水中狀帶脈者回帶人之身體病即其脈緩故令腰容容也此奇經八脈之為病也診得陽維脈浮者暫起目眩陽盛實苦肩息灑灑如寒診得陰維脈沉大而實者苦胸中痛脅下支滿心痛診得陰維如貫珠者男子兩脅實腰中痛女子陰中痛如有瘡狀診得帶脈左右繞臍腹腰脊痛沖陰股也兩手脈浮之俱有陽沉之俱有陰陰陽皆實盛者此為沖督之脈也沖督之脈者十二經之道路也沖督用事則十二經不復朝於寸口其人皆苦恍惚狂癡不者必當猶豫有兩心也兩手陽脈浮而細微綿綿不可知俱有陰脈亦復細綿綿此為陰蹺陽蹺之脈也此家曾有病鬼魅風死苦恍惚亡人為禍也診得陽蹺病拘急陰蹺病緩尺寸俱浮直上直下此為督脈腰背強痛不得俯仰大人癲病小人風癇疾脈來中央浮直上下痛者督脈也動苦腰背膝寒大人癲小兒癇也灸頂上三丸正當頂上尺寸脈俱牢一作芤直上直下此為衝脈胸中有寒疝也脈來中央堅實徑至關者衝脈也動苦少腹痛上搶心有瘕疝絶孕遺矢溺脅支滿煩也橫寸口邊丸丸此為任脈苦腹中有氣如指上搶心不得俯仰拘急脈來緊細實長至關者任脈也動苦少腹繞臍下引橫骨陰中切痛取臍下三寸
